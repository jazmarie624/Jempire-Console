        {text:'Begin working as RBT at ABA clinic',note:'Gain supervised experience',done:false},
      ]},
      {section:'BCBA Requirements', items:[
        {text:"Complete Bachelor's degree in Psychology (UCF)",done:false},
        {text:"Enroll in BCBA-verified Master's program",note:'FIT, UCF, or Nova Southeastern',done:false},
        {text:'Complete 2,000 hours supervised fieldwork (Concentration)',done:false},
        {text:'Complete required coursework: behavior analysis series',done:false},
        {text:'Apply to take BCBA board exam',note:'BACB.com — application opens after hours complete',done:false},
        {text:'Pass BCBA exam',done:false},
        {text:'Maintain BCBA certification (CEUs required)',done:false},
      ]},
      {section:'J Empire ABA Clinic', items:[
        {text:'Research ABA clinic startup costs and licensing in FL',done:false},
        {text:'Get familiar with Florida Medicaid billing for ABA',done:false},
        {text:'Network with current BCBAs in Orlando/Osceola area',done:false},
        {text:'Begin J Empire ABA Clinic business plan',done:false},
        {text:'Register J Empire Consult LLC as business entity',done:false},
      ]}
    ]
  },
  { id:'other',    name:'Other',            emoji:'📚', color:'#B8896E',
    desc:'General Study & Notes',
    checklist:[
      {section:'My Study Items', items:[
        {text:'Add your own study items here',note:'Tap + below to add',done:false},
      ]}
    ]
  },
];

let sessions = [], activeSub = 'notary', activeSubTab = 'checklist';
let checklists = {}, notes = {};
let dailyGoal = parseFloat(localStorage.getItem('study-daily-goal')||'1');
let weeklyGoal = parseFloat(localStorage.getItem('study-weekly-goal')||'5');

function lsGet(k){ try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }
function fmtH(h){ const v=parseFloat(h||0); return v===Math.floor(v)?v+'h':v.toFixed(1)+'h'; }
function todayKey(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){ if(!d) return ''; const x=new Date(d+'T12:00:00'); return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][x.getDay()]+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][x.getMonth()]+' '+x.getDate(); }
function thisMonthKey(){ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); }

async function sbFetch(path,opts={}){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
      method:opts.method||'GET',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:opts.body||undefined
    });
    if(!res.ok) return null;
    const t=await res.text(); return t?JSON.parse(t):[];
  }catch{return null;}
}

function loadChecklists(){
  SUBJECTS.forEach(sub=>{
    const saved = lsGet('study_cl_'+sub.id);
    if(saved){
      // Merge saved checked states into default checklist
      checklists[sub.id] = JSON.parse(JSON.stringify(sub.checklist));
      checklists[sub.id].forEach(section=>{
        section.items.forEach(item=>{
          const savedItem = saved.flatMap(s=>s.items).find(si=>si.text===item.text);
          if(savedItem) item.done = savedItem.done;
        });
      });
    } else {
      checklists[sub.id] = JSON.parse(JSON.stringify(sub.checklist));
    }
    notes[sub.id] = lsGet('study_notes_'+sub.id)||'';
  });
}

function saveChecklist(subId){ lsSet('study_cl_'+subId, checklists[subId]); }
function saveNotes(subId){ lsSet('study_notes_'+subId, notes[subId]); }

async function init(){
  const data = await sbFetch('study_tracker?order=date.desc');
  sessions = data || lsGet('je_study')||[];
  if(data) lsSet('je_study', sessions);
  loadChecklists();
  buildSubjectTabs();
  updateStreak();
  renderMain();
  setInterval(()=>{
    sbFetch('study_tracker?order=date.desc').then(d=>{ if(d){ sessions=d; lsSet('je_study',sessions); updateStreak(); if(activeSubTab==='sessions') renderSessionsTab(); } });
  },30000);
}

function buildSubjectTabs(){
  document.getElementById('subjectTabs').innerHTML = SUBJECTS.map(s=>{
    const isActive = s.id===activeSub;
    const subSessions = sessions.filter(x=>x.subject===s.id);
    const hrs = subSessions.reduce((a,x)=>a+parseFloat(x.hours||0),0);
    return `<button class="subject-tab ${isActive?'active':''}"
      style="${isActive?'background:'+s.color+';border-color:'+s.color:'border-color:'+s.color+'55;color:'+s.color}"
      onclick="switchSubject('${s.id}')">
      ${s.emoji} ${s.name}${hrs>0?' · '+fmtH(hrs):''}
    </button>`;
  }).join('');
}

function switchSubject(id){ activeSub=id; activeSubTab='checklist'; buildSubjectTabs(); renderMain(); }
function switchSubTab(tab){ activeSubTab=tab; renderMain(); }

function renderMain(){
  const sub = SUBJECTS.find(s=>s.id===activeSub);
  const cl = checklists[activeSub]||[];
  const totalItems = cl.flatMap(s=>s.items).length;
  const doneItems = cl.flatMap(s=>s.items).filter(i=>i.done).length;
  const pct = totalItems>0?Math.round((doneItems/totalItems)*100):0;

  let html = `
    <div class="subject-hero" style="background:linear-gradient(135deg,${sub.color},${sub.color}CC)">
      <span class="subject-hero-icon">${sub.emoji}</span>
      <div class="subject-hero-name">${sub.name}</div>
      <div class="subject-hero-sub">${sub.desc}</div>
      <div class="subject-hero-progress">
        <div class="shp-label"><span>${doneItems} of ${totalItems} steps complete</span><span>${pct}%</span></div>
        <div class="shp-bar"><div class="shp-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div class="sub-tabs">
      <button class="sub-tab ${activeSubTab==='checklist'?'active':''}" onclick="switchSubTab('checklist')">✅ Checklist</button>
      <button class="sub-tab ${activeSubTab==='notes'?'active':''}" onclick="switchSubTab('notes')">📝 Notes</button>
      <button class="sub-tab ${activeSubTab==='sessions'?'active':''}" onclick="switchSubTab('sessions')">📖 Sessions</button>
    </div>`;

  if(activeSubTab==='checklist') html += renderChecklistTab();
  else if(activeSubTab==='notes') html += renderNotesTab();
  else html += renderSessionsTab(true);

  document.getElementById('mainContent').innerHTML = html;

  // Restore notes textarea value
  if(activeSubTab==='notes'){
    const ta = document.getElementById('notesTA');
    if(ta) ta.value = notes[activeSub]||'';
  }
}

function renderChecklistTab(){
  const cl = checklists[activeSub]||[];
  let html = '';
  cl.forEach((section,si)=>{
    html += `<div class="checklist-section">
      <div class="checklist-section-label">${section.section}</div>
      <div class="checklist">
        ${section.items.map((item,ii)=>`
          <div class="checklist-item ${item.done?'checked-item':''}" id="cl-${si}-${ii}">
            <div class="cl-check ${item.done?'checked':''}" onclick="toggleCL(${si},${ii})">✓</div>
            <div class="cl-content">
              <div class="cl-text">${item.text}</div>
              ${item.note?`<div class="cl-note">${item.note}</div>`:''}
              ${item.cost?`<span class="cl-cost">${item.cost}</span>`:''}
            </div>
            <button class="cl-del" onclick="deleteCL(${si},${ii})">🗑️</button>
          </div>`).join('')}
        <div class="add-cl-row">
          <input class="add-cl-inp" id="cl-inp-${si}" placeholder="Add a step..." onkeydown="if(event.key==='Enter')addCL(${si})" />
          <button class="add-cl-btn" onclick="addCL(${si})" style="background:linear-gradient(135deg,${SUBJECTS.find(s=>s.id===activeSub).color},${SUBJECTS.find(s=>s.id===activeSub).color}CC)">+ Add</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function renderNotesTab(){
  const sub = SUBJECTS.find(s=>s.id===activeSub);
  return `
    <div class="notes-area">
      <textarea class="notes-textarea" id="notesTA"
        placeholder="Study notes for ${sub.name}... key terms, reminders, things to follow up on. This is your space. ✦"
        oninput="notes['${activeSub}']=this.value"></textarea>
      <div class="notes-footer">
        <span class="notes-chars" id="notesChars"></span>
        <button class="notes-save-btn" onclick="saveNotesNow()">Save Notes ✦</button>
      </div>
    </div>`;
}

function renderSessionsTab(returnHtml=false){
  const sub = SUBJECTS.find(s=>s.id===activeSub);
  const subSessions = sessions.filter(s=>s.subject===activeSub);
  const todayH = subSessions.filter(s=>s.date===todayKey()).reduce((a,x)=>a+parseFloat(x.hours||0),0);
  const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-weekStart.getDay());
  const weekH = subSessions.filter(s=>s.date>=weekStart.toISOString().split('T')[0]).reduce((a,x)=>a+parseFloat(x.hours||0),0);
  const totalH = subSessions.reduce((a,x)=>a+parseFloat(x.hours||0),0);
  const dp=Math.min(100,Math.round((todayH/dailyGoal)*100));
  const wp=Math.min(100,Math.round((weekH/weeklyGoal)*100));

  let html = `
    <div class="goals-mini">
      <div class="goals-mini-row">
        <div class="gm-label"><span>📅 Today (${sub.name})</span><span>${fmtH(todayH)} / ${fmtH(dailyGoal)}${dp>=100?' 🌟':''}</span></div>
        <div class="gm-bar"><div class="gm-fill" style="width:${dp}%;background:${dp>=100?'var(--green)':sub.color}"></div></div>
      </div>
      <div class="goals-mini-row">
        <div class="gm-label"><span>📆 This Week</span><span>${fmtH(weekH)} / ${fmtH(weeklyGoal)}${wp>=100?' 🌟':''}</span></div>
        <div class="gm-bar"><div class="gm-fill" style="width:${wp}%;background:${wp>=100?'var(--green)':sub.color}88"></div></div>
      </div>
    </div>
    <div class="log-form" id="logForm">
      <input class="form-input" id="sTopic" placeholder="What did you study?" />
      <div class="form-row">
        <input class="form-input" id="sHours" type="number" placeholder="Hours" min="0.25" step="0.25" style="flex:0.7" />
        <input class="form-input" id="sDate" type="date" style="flex:1" value="${todayKey()}" />
      </div>
      <input class="form-input" id="sNotes" placeholder="Key takeaways (optional)" />
      <div class="form-row">
        <button class="form-btn form-btn-cancel" onclick="closeLogForm()">Cancel</button>
        <button class="form-btn form-btn-save" onclick="logSession()" style="background:linear-gradient(135deg,${sub.color},${sub.color}CC)">Log Session ✦</button>
      </div>
    </div>
    <div class="section-hdr">
      <div class="section-title">${sub.emoji} ${sub.name} Sessions · ${fmtH(totalH)} total</div>
      <button class="add-btn" style="color:${sub.color}" onclick="openLogForm()">+ Log</button>
    </div>
    <div class="session-list">
      ${!subSessions.length
        ?`<div class="empty-state">"No ${sub.name} sessions yet. Log your first one and start building! ✦"</div>`
        :subSessions.map(s=>`
          <div class="session-card">
            <div class="session-dot" style="background:${sub.color}"></div>
            <div style="flex:1">
              <div class="session-topic">${s.topic}</div>
              <div class="session-meta">${fmtDate(s.date)}</div>
              ${s.notes?`<div class="session-notes-text">${s.notes}</div>`:''}
            </div>
            <div class="session-hours-disp" style="color:${sub.color}">${fmtH(s.hours)}</div>
            <button class="session-del" onclick="delSession('${s.id}')">🗑️</button>
          </div>`).join('')
      }
    </div>`;

  if(returnHtml) return html;
  document.getElementById('mainContent').innerHTML = html.replace('<!-- sessions content -->', '');
}

function toggleCL(si,ii){
  checklists[activeSub][si].items[ii].done = !checklists[activeSub][si].items[ii].done;
  saveChecklist(activeSub); renderMain();
  if(checklists[activeSub][si].items[ii].done){ showToast('Step done! ✦ Keep going!'); spawnSparkles(); }
}

function deleteCL(si,ii){
  checklists[activeSub][si].items.splice(ii,1);
  saveChecklist(activeSub); renderMain();
}

function addCL(si){
  const inp = document.getElementById('cl-inp-'+si);
  const text = inp?.value?.trim(); if(!text) return;
  checklists[activeSub][si].items.push({text,done:false});
  saveChecklist(activeSub); renderMain(); showToast('Step added ✦');
}

function saveNotesNow(){
  const ta = document.getElementById('notesTA');
  if(ta) notes[activeSub]=ta.value;
  saveNotes(activeSub); showToast('Notes saved ✦');
}

function openLogForm(){ document.getElementById('logForm')?.classList.add('visible'); }
function closeLogForm(){ document.getElementById('logForm')?.classList.remove('visible'); }

async function logSession(){
  const topic=document.getElementById('sTopic')?.value?.trim();
  const hours=parseFloat(document.getElementById('sHours')?.value);
  const date=document.getElementById('sDate')?.value;
  const sNotes=document.getElementById('sNotes')?.value?.trim();
  if(!topic||!hours||!date){ showToast('Fill in topic, hours and date'); return; }
  const s={id:Date.now().toString(),subject:activeSub,topic,hours,date,notes:sNotes,created_at:new Date().toISOString()};
  sessions.unshift(s); lsSet('je_study',sessions);
  sbFetch('study_tracker',{method:'POST',body:JSON.stringify(s)});
  closeLogForm();
  buildSubjectTabs(); updateStreak(); renderMain();
  const msgs=["Session logged ✦ You are building your empire!","That's another brick laid. Keep going! ✦","Every session counts. Unstoppable queen ✦","BCBA is getting closer. You've got this! ✦"];
  showToast(msgs[Math.floor(Math.random()*msgs.length)]);
  spawnSparkles();
}

async function delSession(id){
  sessions=sessions.filter(x=>x.id!==id); lsSet('je_study',sessions);
  sbFetch('study_tracker?id=eq.'+id,{method:'DELETE'});
  buildSubjectTabs(); updateStreak(); renderMain();
}

function updateStreak(){
  if(!sessions.length) return;
  const dates=new Set(sessions.map(s=>s.date));
  let streak=0; const d=new Date();
  while(true){ const k=d.toISOString().split('T')[0]; if(dates.has(k)){streak++;d.setDate(d.getDate()-1);}else break; }
  const icon=streak>=14?'🔥':streak>=7?'⚡':streak>=3?'📖':'📚';
  document.getElementById('streakIcon').textContent=icon;
  document.getElementById('streakNum').textContent=streak;
  document.getElementById('streakTitle').textContent=streak===0?'Start your streak today!':streak+' day study streak!';
  document.getElementById('streakSub').textContent=streak===0?'Log a session to begin building momentum':streak>=7?'Unstoppable! Don\'t break the chain ✦':'Building momentum — keep going! ✦';
}

function spawnSparkles(){
  const s=['✦','✧','⋆','📜','⭑'],c=['#C4714F','#D4A574','#B8896E','#5A8A5E'];
  for(let i=0;i<7;i++){
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=s[Math.floor(Math.random()*s.length)];
    el.style.cssText=`left:${20+Math.random()*60}vw;top:${15+Math.random()*55}vh;color:${c[Math.floor(Math.random()*c.length)]};font-size:${12+Math.random()*14}px;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1600);
  }
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

init();
</script>

</html>
