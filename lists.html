<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J Empire · Lists</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#F4EFE8;--cream2:#EDE6DC;--cream3:#E5DDD2;--white:#FDFAF6;
  --terra:#C4714F;--terra-l:#D4876E;--terra-d:#A85A38;
  --rose:#B8896E;--brown:#2C1A0E;--brown-mid:#6B4232;--brown-soft:#9A7060;
  --green:#3A7D4F;--green-l:#4A9D62;--green-bg:#EBF5EE;--green-border:#B8DFC4;
  --red:#C0392B;--red-bg:#FDECEA;--red-border:#F5C0BB;
  --border:#DDD4C8;--shadow:rgba(44,26,14,0.08);
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh;padding-bottom:80px;}
.hdr{background:var(--brown);padding:32px 18px 20px;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(196,113,79,0.15),transparent 70%);}
.hdr-eye{font-size:9px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--rose);margin-bottom:6px;position:relative;z-index:1;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--cream);line-height:1;position:relative;z-index:1;}
.hdr-title span{color:var(--terra-l);}
.hdr-sub{font-size:11px;color:rgba(244,239,232,0.6);margin-top:5px;font-style:italic;font-family:'Cormorant Garamond',serif;position:relative;z-index:1;}
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:11px;text-align:center;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--brown-soft);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{color:var(--terra);border-bottom-color:var(--terra);}
.sec-hdr{margin:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;}
.sec-title{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--brown-soft);}
.sec-btn{background:var(--terra);color:#fff;border:none;border-radius:18px;padding:7px 16px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.add-form{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin:0 14px 12px;display:none;flex-direction:column;gap:10px;box-shadow:0 2px 8px var(--shadow);}
.add-form.open{display:flex;}
.form-lbl{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--brown-soft);margin-bottom:3px;}
.form-select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:var(--cream);color:var(--brown);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;outline:none;-webkit-appearance:none;}
.form-select:focus{border-color:var(--terra);}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:var(--cream);color:var(--brown);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;outline:none;}
.form-input:focus{border-color:var(--terra);}
.form-input::placeholder{color:var(--brown-soft);}
.form-btns{display:flex;gap:8px;}
.btn-save{flex:2;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--terra-d),var(--terra));color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-cancel{flex:1;padding:11px;border-radius:10px;border:none;background:var(--cream2);color:var(--brown-soft);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.lists-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}
.list-card{background:var(--white);border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 4px var(--shadow);overflow:hidden;cursor:pointer;transition:all 0.15s;}
.list-card:active{transform:scale(0.97);}
.list-card.done-card{border-color:var(--green);}
.lc-top{padding:14px 14px 10px;}
.lc-emoji{font-size:24px;margin-bottom:6px;}
.lc-name{font-size:13px;font-weight:700;color:var(--brown);line-height:1.2;}
.lc-count{font-size:10px;font-weight:600;color:var(--brown-soft);margin-top:3px;}
.lc-prog{padding:0 14px 12px;}
.lcp-bar{height:5px;background:var(--cream3);border-radius:5px;overflow:hidden;margin-bottom:4px;}
.lcp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green),var(--green-l));transition:width 0.4s;}
.lcp-row{display:flex;justify-content:space-between;font-size:9px;font-weight:600;color:var(--brown-soft);}
.lc-done-badge{background:var(--green-bg);border-top:1px solid var(--green-border);padding:6px 14px;display:flex;align-items:center;gap:5px;}
.lcdb-text{font-size:10px;font-weight:700;color:var(--green);}
.list-detail{display:none;padding:0 14px;}
.list-detail.open{display:block;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--terra);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;padding:12px 0 4px;}
.detail-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 12px;}
.detail-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--brown);}
.detail-sub{font-size:11px;font-weight:600;color:var(--brown-soft);margin-top:2px;}
.dp-bar{height:7px;background:var(--cream3);border-radius:7px;overflow:hidden;margin-bottom:5px;}
.dp-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--green),var(--green-l));transition:width 0.4s;}
.dp-row{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--brown-soft);margin-bottom:12px;}
.add-item-form{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 1px 4px var(--shadow);}
.add-item-row{display:flex;gap:8px;}
.add-item-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--cream);color:var(--brown);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;outline:none;}
.add-item-input:focus{border-color:var(--terra);}
.add-item-input::placeholder{color:var(--brown-soft);}
.add-item-btn{background:var(--terra);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer;}
.qty-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.qty-chip{background:var(--cream2);border:1px solid var(--border);border-radius:18px;padding:4px 11px;font-size:10px;font-weight:600;color:var(--brown-mid);cursor:pointer;}
.qty-chip.sel{background:var(--terra);color:#fff;border-color:var(--terra);}
.items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.item-card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:11px 13px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 3px var(--shadow);}
.item-card.checked{opacity:0.6;background:var(--cream2);}
.item-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s;font-size:13px;}
.item-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.item-text{flex:1;font-size:13px;font-weight:600;color:var(--brown);}
.item-card.checked .item-text{text-decoration:line-through;color:var(--brown-soft);}
.item-qty{font-size:10px;font-weight:700;color:var(--brown-soft);background:var(--cream2);padding:2px 8px;border-radius:10px;flex-shrink:0;}
.item-del{background:none;border:none;font-size:14px;cursor:pointer;color:var(--brown-soft);padding:2px 4px;flex-shrink:0;}
.all-done{background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;}
.all-done-icon{font-size:28px;margin-bottom:6px;}
.all-done-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px;}
.all-done-sub{font-size:11px;font-weight:600;color:var(--green);margin-bottom:12px;}
.all-done-btns{display:flex;gap:8px;}
.adb-complete{flex:2;padding:10px;border-radius:10px;border:none;background:var(--green);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.adb-keep{flex:1;padding:10px;border-radius:10px;border:1px solid var(--green-border);background:transparent;color:var(--green);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.list-actions{display:flex;gap:8px;margin-bottom:14px;}
.la-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--cream2);color:var(--brown-mid);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.la-del{color:var(--red);border-color:var(--red-border);background:var(--red-bg);}
.completed-list{padding:0 14px;display:flex;flex-direction:column;gap:8px;}
.comp-card{background:var(--white);border:1.5px solid var(--green-border);border-radius:12px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;}
.cc-left{display:flex;align-items:center;gap:10px;}
.cc-emoji{font-size:20px;}
.cc-name{font-size:13px;font-weight:700;color:var(--brown);}
.cc-meta{font-size:10px;font-weight:600;color:var(--brown-soft);margin-top:2px;}
.cc-date{font-size:10px;font-weight:600;color:var(--green);margin-top:2px;}
.cc-actions{display:flex;gap:6px;}
.cc-restore{background:var(--cream2);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:10px;font-weight:600;color:var(--brown-mid);cursor:pointer;font-family:'Inter',sans-serif;}
.cc-del{background:var(--red-bg);border:1px solid var(--red-border);border-radius:7px;padding:6px 11px;font-size:10px;font-weight:600;color:var(--red);cursor:pointer;font-family:'Inter',sans-serif;}
.empty{text-align:center;padding:40px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--brown-soft);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--terra);color:#fff;padding:9px 20px;border-radius:20px;font-size:11px;font-weight:700;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--brown);border-top:2px solid rgba(196,113,79,0.3);padding:9px 20px 16px;display:flex;justify-content:space-around;z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(244,239,232,0.4);}
.nav-item.active{color:var(--terra-l);}
.nav-icon{font-size:18px;}

.store-suggestions{margin-bottom:12px;}
.sug-lbl{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--brown-soft);margin-bottom:8px;}
.sug-chips{display:flex;flex-wrap:wrap;gap:6px;}
.sug-chip{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--brown-mid);cursor:pointer;transition:all 0.15s;}
.sug-chip:active{background:var(--terra);color:#fff;border-color:var(--terra);}
.sug-chip.added{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-eye">Lists · J Empire</div>
  <div class="hdr-title">📋 <span>My Lists</span></div>
  <div class="hdr-sub">"Every errand conquered is time reclaimed." ✦</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('active',this)">📋 Active Lists</div>
  <div class="tab" onclick="switchTab('completed',this)">✅ Completed</div>
</div>

<div id="tab-active">
  <div id="homeView">
    <div class="sec-hdr">
      <div class="sec-title">My Lists</div>
      <button class="sec-btn" onclick="toggleAddForm()">+ New List</button>
    </div>
    <div class="add-form" id="addListForm">
      <div>
        <div class="form-lbl">Store / List Name</div>
        <select class="form-select" id="storeSelect" onchange="applyStore()">
          <option value="">— Choose a store —</option>
          <option value="🛒|Walmart">🛒 Walmart</option>
          <option value="🎯|Target">🎯 Target</option>
          <option value="🏪|Sam's Club">🏪 Sam's Club</option>
          <option value="🥑|Aldi">🥑 Aldi</option>
          <option value="🌿|Whole Foods">🌿 Whole Foods</option>
          <option value="🏬|Publix">🏬 Publix</option>
          <option value="📦|Amazon">📦 Amazon</option>
          <option value="🔨|Home Depot">🔨 Home Depot</option>
          <option value="💊|CVS / Walgreens">💊 CVS / Walgreens</option>
          <option value="👶|Kids Stuff">👶 Kids Stuff</option>
          <option value="🏫|School Supplies">🏫 School Supplies</option>
          <option value="🧴|Beauty / Personal">🧴 Beauty / Personal</option>
          <option value="🌮|Latin Market">🌮 Latin Market</option>
          <option value="📝|Custom">📝 Custom List</option>
        </select>
      </div>
      <div id="customNameWrap" style="display:none;">
        <div class="form-lbl">Custom Name</div>
        <input class="form-input" id="customName" placeholder="e.g. Back to School"/>
      </div>
      <div class="form-btns">
        <button class="btn-cancel" onclick="toggleAddForm()">Cancel</button>
        <button class="btn-save" onclick="createList()">Create List ✦</button>
      </div>
    </div>
    <div class="lists-grid" id="listsGrid"></div>
  </div>

  <div class="list-detail" id="detailView">
    <button class="back-btn" onclick="goHome()">‹ Back to Lists</button>
    <div class="detail-hdr">
      <div><div class="detail-title" id="detailTitle"></div><div class="detail-sub" id="detailSub"></div></div>
      <div style="font-size:32px;" id="detailEmoji"></div>
    </div>
    <div class="dp-bar"><div class="dp-fill" id="detailProgFill" style="width:0%"></div></div>
    <div class="dp-row" id="detailProgRow"></div>
    <div id="allDoneCard"></div>
    <div id="storeSuggestions"></div>
    <div class="add-item-form">
      <div class="add-item-row">
        <input class="add-item-input" id="itemInput" placeholder="Add an item... ✦" onkeypress="if(event.key==='Enter')addItem()"/>
        <button class="add-item-btn" onclick="addItem()">+ Add</button>
      </div>
      <div class="qty-row" id="qtyChips"></div>
    </div>
    <div class="items-list" id="itemsList"></div>
    <div class="list-actions">
      <button class="la-btn" onclick="clearChecked()">🗑️ Clear Checked</button>
      <button class="la-btn la-del" onclick="deleteCurrentList()">Delete List</button>
    </div>
  </div>
</div>

<div id="tab-completed" style="display:none;">
  <div class="sec-hdr"><div class="sec-title">Completed Lists</div></div>
  <div class="completed-list" id="completedList"></div>
</div>

<div class="toast" id="toast"></div>

<div class="nav">
  <a class="nav-item" href="https://jazmarie624.github.io/Jempire-Console/index.html"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-item active" href="#"><span class="nav-icon">📋</span>Lists</a>
  <a class="nav-item" href="https://jazmarie624.github.io/Jempire-Console/planner.html"><span class="nav-icon">📅</span>Planner</a>
</div>

<script>
function lg(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let lists=[],currentListId=null,selQty='x1',addFormOpen=false;


const STORE_SUGGESTIONS = {
  'Walmart': ['Milk','Eggs','Bread','Butter','Chicken breast','Ground beef','Rice','Pasta','Cereal','Juice','Paper towels','Toilet paper','Dish soap','Laundry detergent','Shampoo','Diapers','Baby wipes','Snacks','Cheese','Yogurt','Bananas','Apples','Potatoes','Onions','Garlic'],
  'Target': ['Paper towels','Toilet paper','Shampoo','Conditioner','Body wash','Deodorant','Toothpaste','Snacks','Juice boxes','Cereal','Coffee','Tea','Cleaning supplies','Laundry pods','Dish soap','Kids clothing','School supplies','Sunscreen','Vitamins','Makeup'],
  "Sam's Club": ['Chicken breast bulk','Ground beef bulk','Eggs 36pk','Milk gallon','Butter 4pk','Cheese block','Pasta bulk','Rice bulk','Olive oil','Paper towels bulk','Toilet paper bulk','Trash bags','Zip lock bags','Juice boxes bulk','Granola bars bulk','Chips bulk','Frozen meals','Salmon','Shrimp','Laundry detergent bulk'],
  'Aldi': ['Milk','Eggs','Bread','Butter','Chicken breast','Ground beef','Pasta','Rice','Frozen veggies','Cheese','Greek yogurt','Orange juice','Apples','Bananas','Salad mix','Tomatoes','Avocados','Hummus','Crackers','Cereal','Coffee','Olive oil','Canned beans','Snacks'],
  'Publix': ['Publix sub','Deli turkey','Deli ham','Cheese slices','Sub rolls','Rotisserie chicken','Fresh bread','Bakery items','Sushi','Potato salad','Fried chicken','Fresh fruit','Steak','Pork chops','Seafood','BOGO items'],
  'Whole Foods': ['Organic chicken','Organic eggs','Almond milk','Oat milk','Protein bars','Kombucha','Salad greens','Quinoa','Brown rice','Almond butter','Avocados','Berries','Supplements','Organic snacks','Gluten free bread','Cold brew'],
  'Amazon': ['Paper towels','Toilet paper','Dish soap','Laundry detergent','Trash bags','Vitamins','School supplies','Batteries','Light bulbs','Cleaning supplies','Baby items','Pet food','Snacks bulk','Coffee'],
  'Home Depot': ['Light bulbs','Batteries','Extension cord','Trash bags','Cleaning supplies','Mop','Broom','Air filter','Storage bins','Command hooks','Paint','Duct tape','WD40','Plunger'],
  'CVS / Walgreens': ['Prescription pickup','Vitamins','Pain reliever','Cold medicine','Band aids','Sunscreen','Shampoo','Toothpaste','Deodorant','Makeup','Batteries','Snacks','Gift cards'],
  'Kids Stuff': ['Diapers','Baby wipes','Baby formula','Sippy cups','Juice boxes','Goldfish crackers','String cheese','Fruit pouches','Mac and cheese','Chicken nuggets','Dino nuggets','Fruit snacks','Granola bars','Yogurt tubes','Apple juice'],
  'School Supplies': ['Pencils','Pens','Highlighters','Notebooks','Folders','Binders','Glue sticks','Scissors','Ruler','Crayons','Colored pencils','Markers','Pencil case','Backpack','Lunch box','Water bottle','Hand sanitizer'],
  'Beauty / Personal': ['Shampoo','Conditioner','Body wash','Face wash','Moisturizer','Sunscreen','Deodorant','Razor','Makeup remover','Foundation','Mascara','Lip gloss','Nail polish','Cotton rounds','Tweezers','Hair ties'],
  'Latin Market': ['Sofrito','Sazon','Adobo','Recao','Yuca','Plantains','Green bananas','Gandules','Black beans','Red beans','Bacalao','Pernil','Chorizo','Masarepa','Tortillas','Salsa','Queso fresco','Crema','Arroz','Abuela coffee','Malta','Goya products'],
};

function renderSuggestions(listName){
  const suggestions = STORE_SUGGESTIONS[listName];
  if(!suggestions) return '';
  const list = lists.find(l=>l.id===currentListId);
  const existingItems = list ? list.items.map(i=>i.text.toLowerCase()) : [];
  return `<div class="store-suggestions">
    <div class="sug-lbl">✦ Quick Add for ${listName}</div>
    <div class="sug-chips">
      ${suggestions.map(s=>`<div class="sug-chip${existingItems.includes(s.toLowerCase())?' added':''}" onclick="quickAdd('${s.replace(/'/g,"\'")}',this)">${existingItems.includes(s.toLowerCase())?'✓ ':''} ${s}</div>`).join('')}
    </div>
  </div>`;
}

function quickAdd(text, btn){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  if(list.items.find(i=>i.text.toLowerCase()===text.toLowerCase())){
    showToast(text+' already added');return;
  }
  list.items.push({id:'item_'+Date.now(),text,qty:'x1',checked:false});
  saveAll();
  btn.classList.add('added');
  btn.textContent='✓ '+text;
  showToast(text+' added ✦');
  // Refresh items list without full re-render to keep scroll position
  const total=list.items.length,checked=list.items.filter(i=>i.checked).length;
  const pct=total>0?Math.round((checked/total)*100):0;
  document.getElementById('detailSub').textContent='Created '+list.created+' · '+total+' items';
  document.getElementById('detailProgFill').style.width=pct+'%';
  document.getElementById('detailProgRow').innerHTML='<span>'+checked+' of '+total+' checked</span><span>'+pct+'%</span>';
  renderItemsOnly();
}

function renderItemsOnly(){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  const unchecked=list.items.filter(i=>!i.checked);
  const checkedItems=list.items.filter(i=>i.checked);
  const all=[...unchecked,...checkedItems];
  document.getElementById('itemsList').innerHTML=all.length?all.map(item=>`
    <div class="item-card${item.checked?' checked':''}">
      <div class="item-check${item.checked?' on':''}" onclick="toggleItem('${item.id}')">${item.checked?'✓':''}</div>
      <div class="item-text">${item.text}</div>
      ${item.qty&&item.qty!=='x1'?`<div class="item-qty">${item.qty}</div>`:''}
      <button class="item-del" onclick="deleteItem('${item.id}')">✕</button>
    </div>`).join(''):'<div style="text-align:center;padding:20px;color:var(--brown-soft);font-size:12px;font-style:italic;">No items yet — add your first item above ✦</div>';
}

function loadAll(){
  lists=lg('je_lists_v2')||[];
  renderGrid();
  // Background sync from Supabase
  fetch('https://ejseathlglvvnmkpchib.supabase.co/rest/v1/lists?app_key=eq.je_lists_v2',{headers:{'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqc2VhdGhsZ2x2dm5ta3BjaGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc4NTUsImV4cCI6MjA5NzU2Mzg1NX0.o4crd1W5-NbVNXSOWNT-WPHS7R6orRe9CRYFZfZ41L8','Authorization':'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqc2VhdGhsZ2x2dm5ta3BjaGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc4NTUsImV4cCI6MjA5NzU2Mzg1NX0.o4crd1W5-NbVNXSOWNT-WPHS7R6orRe9CRYFZfZ41L8'}}).then(r=>r.json()).then(d=>{if(d&&d.length>0){const parsed=JSON.parse(d[0].data);if(parsed&&parsed.length>0){lists=parsed;ls('je_lists_v2',lists);renderGrid();}}}).catch(()=>{});
}
function saveAll(){
  ls('je_lists_v2',lists);
  // Background save to Supabase
  const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqc2VhdGhsZ2x2dm5ta3BjaGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc4NTUsImV4cCI6MjA5NzU2Mzg1NX0.o4crd1W5-NbVNXSOWNT-WPHS7R6orRe9CRYFZfZ41L8';
  const h={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
  const SB='https://ejseathlglvvnmkpchib.supabase.co';
  fetch(`${SB}/rest/v1/lists?app_key=eq.je_lists_v2`,{headers:h}).then(r=>r.json()).then(d=>{
    if(d&&d.length>0){fetch(`${SB}/rest/v1/lists?app_key=eq.je_lists_v2`,{method:'PATCH',headers:h,body:JSON.stringify({data:JSON.stringify(lists)})});}
    else{fetch(`${SB}/rest/v1/lists`,{method:'POST',headers:{...h,'Prefer':'return=representation'},body:JSON.stringify({app_key:'je_lists_v2',data:JSON.stringify(lists)})});}
  }).catch(()=>{});
}

function switchTab(t,el){
  document.getElementById('tab-active').style.display=t==='active'?'block':'none';
  document.getElementById('tab-completed').style.display=t==='completed'?'block':'none';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  if(t==='completed')renderCompleted();
  if(t==='active')goHome();
}

function toggleAddForm(){
  addFormOpen=!addFormOpen;
  document.getElementById('addListForm').classList.toggle('open',addFormOpen);
}

function applyStore(){
  const v=document.getElementById('storeSelect').value;
  document.getElementById('customNameWrap').style.display=v==='📝|Custom'?'block':'none';
}

function createList(){
  const v=document.getElementById('storeSelect').value;
  if(!v){showToast('Please select a store');return;}
  const isCustom=v==='📝|Custom';
  const name=isCustom?document.getElementById('customName').value.trim():v.split('|')[1];
  const emoji=isCustom?'📝':v.split('|')[0];
  if(!name){showToast('Please enter a name');return;}
  if(lists.find(l=>l.name===name&&!l.completed)){showToast('List already exists!');return;}
  const newList={id:'list_'+Date.now(),emoji,name,items:[],created:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),completed:false,completedDate:null};
  lists.unshift(newList);
  saveAll();
  document.getElementById('storeSelect').value='';
  document.getElementById('customName').value='';
  document.getElementById('customNameWrap').style.display='none';
  toggleAddForm();
  renderGrid();
  showToast(emoji+' '+name+' created ✦');
}

function renderGrid(){
  const active=lists.filter(l=>!l.completed);
  const grid=document.getElementById('listsGrid');
  if(!active.length){
    grid.innerHTML='<div class="empty" style="grid-column:span 2;"><div class="empty-icon">📋</div><div class="empty-text">No active lists yet — tap + New List ✦</div></div>';
    return;
  }
  grid.innerHTML=active.map(l=>{
    const total=l.items.length,checked=l.items.filter(i=>i.checked).length;
    const pct=total>0?Math.round((checked/total)*100):0;
    const allDone=total>0&&checked===total;
    return `<div class="list-card${allDone?' done-card':''}" onclick="openList('${l.id}')">
      <div class="lc-top"><div class="lc-emoji">${l.emoji}</div><div class="lc-name">${l.name}</div><div class="lc-count">${total} item${total!==1?'s':''} · ${checked} checked</div></div>
      <div class="lc-prog"><div class="lcp-bar"><div class="lcp-fill" style="width:${pct}%"></div></div><div class="lcp-row"><span>${pct}% done</span><span>${total-checked} left</span></div></div>
      ${allDone?'<div class="lc-done-badge"><span>✅</span><span class="lcdb-text">All Done!</span></div>':''}
    </div>`;
  }).join('');
}

function openList(id){
  currentListId=id;
  document.getElementById('homeView').style.display='none';
  document.getElementById('detailView').classList.add('open');
  selQty='x1';
  renderDetail();
  renderQtyChips();
  // Render store suggestions
  const list=lists.find(l=>l.id===id);
  const sugDiv=document.getElementById('storeSuggestions');
  if(sugDiv&&list) sugDiv.innerHTML=renderSuggestions(list.name);
}

function goHome(){
  currentListId=null;
  document.getElementById('homeView').style.display='block';
  document.getElementById('detailView').classList.remove('open');
  renderGrid();
}

function renderDetail(){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  const total=list.items.length,checked=list.items.filter(i=>i.checked).length;
  const pct=total>0?Math.round((checked/total)*100):0;
  const allDone=total>0&&checked===total;
  document.getElementById('detailTitle').textContent=list.name;
  document.getElementById('detailEmoji').textContent=list.emoji;
  document.getElementById('detailSub').textContent='Created '+list.created+' · '+total+' items';
  document.getElementById('detailProgFill').style.width=pct+'%';
  document.getElementById('detailProgRow').innerHTML='<span>'+checked+' of '+total+' checked</span><span>'+pct+'%</span>';
  document.getElementById('allDoneCard').innerHTML=allDone?`<div class="all-done"><div class="all-done-icon">🎉</div><div class="all-done-title">Shopping Complete!</div><div class="all-done-sub">Every item checked off. You did it, Queen! ✦</div><div class="all-done-btns"><button class="adb-complete" onclick="markCompleted()">✅ Move to Completed</button><button class="adb-keep" onclick="uncheckAll()">↺ Uncheck All</button></div></div>`:'';
  const unchecked=list.items.filter(i=>!i.checked);
  const checkedItems=list.items.filter(i=>i.checked);
  const all=[...unchecked,...checkedItems];
  document.getElementById('itemsList').innerHTML=all.length?all.map(item=>`
    <div class="item-card${item.checked?' checked':''}">
      <div class="item-check${item.checked?' on':''}" onclick="toggleItem('${item.id}')">${item.checked?'✓':''}</div>
      <div class="item-text">${item.text}</div>
      ${item.qty&&item.qty!=='x1'?`<div class="item-qty">${item.qty}</div>`:''}
      <button class="item-del" onclick="deleteItem('${item.id}')">✕</button>
    </div>`).join(''):'<div style="text-align:center;padding:20px;color:var(--brown-soft);font-size:12px;font-style:italic;">No items yet — add your first item above ✦</div>';
}

function renderQtyChips(){
  const qtys=['x1','x2','x3','x4','x5','x6','lb','oz','pk','box','bag','gal'];
  document.getElementById('qtyChips').innerHTML=qtys.map(q=>`<div class="qty-chip${selQty===q?' sel':''}" onclick="selectQty('${q}')">${q}</div>`).join('');
}

function selectQty(q){selQty=q;renderQtyChips();}

function addItem(){
  const input=document.getElementById('itemInput');
  const text=input.value.trim();
  if(!text){showToast('Type an item first');return;}
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  list.items.push({id:'item_'+Date.now(),text,qty:selQty,checked:false});
  saveAll();input.value='';selQty='x1';
  renderDetail();renderQtyChips();
  showToast('Added ✦');
}

function toggleItem(itemId){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  const item=list.items.find(i=>i.id===itemId);if(!item)return;
  item.checked=!item.checked;
  saveAll();renderDetail();
  const allDone=list.items.length>0&&list.items.every(i=>i.checked);
  if(allDone)showToast('All items checked! 🎉');
}

function deleteItem(itemId){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  list.items=list.items.filter(i=>i.id!==itemId);
  saveAll();renderDetail();
}

function clearChecked(){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  const count=list.items.filter(i=>i.checked).length;
  if(!count){showToast('No checked items');return;}
  list.items=list.items.filter(i=>!i.checked);
  saveAll();renderDetail();showToast(count+' item'+(count!==1?'s':'')+' cleared');
}

function uncheckAll(){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  list.items.forEach(i=>i.checked=false);
  saveAll();renderDetail();
}

function markCompleted(){
  const list=lists.find(l=>l.id===currentListId);if(!list)return;
  list.completed=true;
  list.completedDate=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  saveAll();goHome();showToast(list.emoji+' '+list.name+' completed ✦');
}

function deleteCurrentList(){
  if(!confirm('Delete this list permanently?'))return;
  lists=lists.filter(l=>l.id!==currentListId);
  saveAll();goHome();showToast('List deleted');
}

function renderCompleted(){
  const completed=lists.filter(l=>l.completed);
  const el=document.getElementById('completedList');
  if(!completed.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No completed lists yet ✦</div></div>';return;}
  el.innerHTML=completed.map(l=>`
    <div class="comp-card">
      <div class="cc-left">
        <div class="cc-emoji">${l.emoji}</div>
        <div><div class="cc-name">${l.name}</div><div class="cc-meta">${l.items.length} items</div><div class="cc-date">✓ ${l.completedDate||''}</div></div>
      </div>
      <div class="cc-actions">
        <button class="cc-restore" onclick="restoreList('${l.id}')">↺</button>
        <button class="cc-del" onclick="deleteCompletedList('${l.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

function restoreList(id){
  const list=lists.find(l=>l.id===id);if(!list)return;
  list.completed=false;list.completedDate=null;
  list.items.forEach(i=>i.checked=false);
  saveAll();renderCompleted();showToast(list.emoji+' '+list.name+' restored ✦');
}

function deleteCompletedList(id){
  if(!confirm('Delete permanently?'))return;
  lists=lists.filter(l=>l.id!==id);
  saveAll();renderCompleted();showToast('Deleted');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadAll();
</script>
</body>
</html>
