<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --cream:#F4EFE8; --cream-deep:#EDE6DC;
  --terra:#C4714F; --terra-light:#D4906E;
  --rose-gold:#B8896E; --rose-light:#D4A574;
  --brown-dark:#2C1A0E; --brown-mid:#6B4232;
  --brown-muted:#9A6E58; --brown-soft:#C4A090;
  --white-warm:rgba(255,252,248,0.95);
  --green:#5A8A5E;
}
body { min-height:100vh; font-family:'Inter',sans-serif; background:var(--cream-deep); color:var(--brown-dark); }

.header { position:relative; overflow:hidden; padding:48px 24px 28px; text-align:center; background:var(--cream); background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(180,140,105,0.07) 3px,rgba(180,140,105,0.07) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(180,140,105,0.05) 3px,rgba(180,140,105,0.05) 4px); }
.header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,transparent,var(--terra) 20%,var(--rose-light) 50%,var(--rose-gold) 80%,transparent); }
.header-marble { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.header-glow { position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 85% 10%,rgba(196,113,79,0.15) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 10% 85%,rgba(184,137,110,0.11) 0%,transparent 50%); }
.bracket { position:absolute; width:24px; height:24px; opacity:0.3; }
.btl { top:14px; left:16px; border-top:1.5px solid var(--terra); border-left:1.5px solid var(--terra); }
.btr { top:14px; right:16px; border-top:1.5px solid var(--terra); border-right:1.5px solid var(--terra); }
.header-content { position:relative; z-index:2; }
.header-eyebrow { font-size:9px; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:var(--rose-gold); margin-bottom:6px; }
.header-title { font-family:'Cormorant Garamond',serif; font-size:44px; font-weight:300; color:var(--brown-dark); line-height:0.95; letter-spacing:0.06em; margin-bottom:10px; }
.header-title em { font-style:italic; color:var(--terra); }
.header-divider { display:flex; align-items:center; gap:8px; width:160px; margin:0 auto 10px; }
.hdl { flex:1; height:1px; background:rgba(196,113,79,0.3); }
.hdg { width:4px; height:4px; background:var(--terra); transform:rotate(45deg); opacity:0.7; }
.header-quote { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--brown-muted); }

/* LIST TABS */
.list-selector { background:var(--cream); border-bottom:1px solid rgba(196,113,79,0.15); padding:12px 16px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; align-items:center; }
.list-selector::-webkit-scrollbar { display:none; }
.list-tab { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; padding:8px 14px; border-radius:20px; border:1px solid rgba(196,113,79,0.22); background:transparent; color:var(--brown-muted); cursor:pointer; transition:all 0.18s; font-family:'Inter',sans-serif; white-space:nowrap; flex-shrink:0; }
.list-tab.active { background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border-color:transparent; box-shadow:0 3px 10px rgba(196,113,79,0.28); }
.new-list-btn { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border:none; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 2px 8px rgba(196,113,79,0.3); transition:all 0.18s; }
.new-list-btn:hover { transform:scale(1.1); }

.main { padding:18px 16px 100px; max-width:500px; margin:0 auto; }

/* STORE GRID (overview) */
.store-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
.store-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.16); border-radius:18px; padding:18px 14px; text-align:center; box-shadow:0 2px 10px rgba(196,113,79,0.07); cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.store-card:hover { transform:translateY(-3px); box-shadow:0 8px 22px rgba(196,113,79,0.16); border-color:rgba(196,113,79,0.35); }
.store-card::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,rgba(196,113,79,0.4),transparent); opacity:0; transition:opacity 0.2s; }
.store-card:hover::after { opacity:1; }
.store-icon { font-size:32px; margin-bottom:8px; }
.store-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:var(--brown-dark); margin-bottom:3px; }
.store-desc { font-size:9px; color:var(--brown-muted); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; margin-bottom:8px; }
.store-progress { height:4px; background:rgba(196,113,79,0.1); border-radius:10px; overflow:hidden; }
.store-progress-fill { height:100%; background:linear-gradient(90deg,var(--terra),var(--rose-light)); border-radius:10px; transition:width 0.4s; }
.store-item-count { font-size:9.5px; color:var(--brown-muted); margin-top:5px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.15); border-radius:14px; padding:12px 10px; text-align:center; }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--terra); }
.stat-label { font-size:8.5px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--brown-muted); margin-top:2px; }

/* SUGGESTIONS */
.suggestions-wrap { background:var(--white-warm); border:1px solid rgba(196,113,79,0.16); border-radius:16px; padding:14px; margin-bottom:16px; box-shadow:0 2px 8px rgba(196,113,79,0.06); }
.suggestions-title { font-size:9px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--rose-gold); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.suggestions-title::after { content:''; flex:1; height:1px; background:rgba(196,113,79,0.2); }
.suggestions-grid { display:flex; flex-wrap:wrap; gap:6px; }
.suggestion-chip { font-size:11px; font-weight:500; color:var(--brown-mid); background:rgba(196,113,79,0.07); border:1px solid rgba(196,113,79,0.2); padding:5px 12px; border-radius:20px; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:4px; }
.suggestion-chip:hover { background:var(--terra); color:var(--cream); border-color:transparent; }
.suggestion-chip.added { opacity:0.4; text-decoration:line-through; pointer-events:none; }

/* QUICK ADD */
.quick-add { background:var(--white-warm); border:1.5px solid rgba(196,113,79,0.2); border-radius:16px; padding:12px 16px; margin-bottom:16px; display:flex; gap:10px; align-items:center; box-shadow:0 2px 8px rgba(196,113,79,0.06); }
.quick-input { flex:1; border:none; background:transparent; font-family:'Inter',sans-serif; font-size:14px; color:var(--brown-dark); outline:none; }
.quick-input::placeholder { color:var(--brown-soft); font-style:italic; }
.quick-add-btn { padding:8px 16px; border-radius:12px; background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border:none; font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; box-shadow:0 2px 8px rgba(196,113,79,0.25); transition:all 0.18s; }
.quick-add-btn:hover { transform:translateY(-1px); }

/* SECTION HDR */
.section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.section-title { font-size:9px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase; color:var(--rose-gold); display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; display:block; width:30px; height:1px; background:rgba(196,113,79,0.25); }
.clear-btn { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-soft); background:transparent; padding:4px 10px; border-radius:12px; cursor:pointer; border:1px solid rgba(196,113,79,0.15); font-family:'Inter',sans-serif; transition:all 0.18s; }
.clear-btn:hover { border-color:var(--terra); color:var(--terra); }

/* ITEMS */
.items-list { display:flex; flex-direction:column; gap:7px; margin-bottom:20px; }
.list-item { background:var(--white-warm); border:1px solid rgba(196,113,79,0.15); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 6px rgba(196,113,79,0.05); transition:all 0.18s; }
.list-item:hover { box-shadow:0 4px 14px rgba(196,113,79,0.11); }
.list-item.checked { opacity:0.45; }
.list-item.checked .item-text { text-decoration:line-through; }
.item-check { width:22px; height:22px; border-radius:6px; border:1.5px solid rgba(196,113,79,0.35); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent; transition:all 0.18s; cursor:pointer; background:transparent; }
.item-check.checked { background:var(--terra); border-color:var(--terra); color:white; }
.item-text { flex:1; font-size:14px; font-weight:500; color:var(--brown-dark); }
.item-qty { font-size:11px; color:var(--brown-muted); font-weight:600; background:rgba(196,113,79,0.08); padding:2px 8px; border-radius:8px; flex-shrink:0; }
.item-flag { font-size:13px; flex-shrink:0; }
.item-del { background:none; border:none; font-size:13px; cursor:pointer; opacity:0.35; transition:opacity 0.18s; flex-shrink:0; }
.item-del:hover { opacity:1; }

/* FORM */
.add-form { background:var(--white-warm); border:1px solid rgba(196,113,79,0.22); border-radius:16px; padding:16px; margin-bottom:16px; display:none; flex-direction:column; gap:10px; box-shadow:0 4px 16px rgba(196,113,79,0.1); }
.add-form.visible { display:flex; }
.form-input { width:100%; padding:10px 14px; border:1px solid rgba(196,113,79,0.25); border-radius:10px; background:var(--cream); color:var(--brown-dark); font-family:'Inter',sans-serif; font-size:13px; outline:none; }
.form-input:focus { border-color:var(--terra); }
.form-input::placeholder { color:var(--brown-soft); }
.form-row { display:flex; gap:8px; }
.form-select { flex:1; padding:9px 12px; border:1px solid rgba(196,113,79,0.25); border-radius:10px; background:var(--cream); color:var(--brown-dark); font-family:'Inter',sans-serif; font-size:12px; outline:none; }
.form-btn { padding:10px 20px; border-radius:10px; border:none; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.18s; }
.form-btn-save { background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); }
.form-btn-cancel { background:rgba(196,113,79,0.1); color:var(--brown-muted); }

.empty-state { text-align:center; padding:28px 16px; }
.empty-icon { font-size:36px; margin-bottom:8px; opacity:0.4; }
.empty-text { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:var(--brown-muted); line-height:1.6; }

.sparkle { position:fixed; pointer-events:none; z-index:9999; animation:sparkle-fly 1.2s ease-out forwards; }
@keyframes sparkle-fly { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}100%{opacity:0;transform:translateY(-80px) scale(0.3) rotate(180deg);} }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); padding:10px 22px; border-radius:24px; font-size:12px; font-weight:600; letter-spacing:0.08em; box-shadow:0 6px 20px rgba(196,113,79,0.4); opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.nav-bar { position:fixed; bottom:0; left:0; right:0; background:var(--cream); border-top:1px solid rgba(196,113,79,0.15); padding:10px 20px 18px; display:flex; justify-content:space-around; align-items:center; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-soft); transition:color 0.18s; }
.nav-item.active { color:var(--terra); }
.nav-icon { font-size:20px; }
</style>

      </div>
      <div class="form-row">
        <button class="form-btn form-btn-cancel" onclick="closeForm('detailForm')">Cancel</button>
        <button class="form-btn form-btn-save" onclick="addDetailItem()">Add ✦</button>
      </div>
    </div>

    <div class="section-hdr">
      <div class="section-title" id="listViewTitle">Items</div>
      <div style="display:flex;gap:6px">
        <button class="clear-btn" onclick="openForm('detailForm')">+ Detail</button>
        <button class="clear-btn" onclick="clearChecked()">Clear Done</button>
      </div>
    </div>
    <div class="items-list" id="itemsList"></div>
  </div>

</div>

    suggestions:['💊 Tylenol / Ibuprofen','🩹 Bandages','🤧 Cold Medicine','💉 Vitamins / Supplements','🌡️ Thermometer','👶 Kids Fever Reducer','🧴 Lotion / Moisturizer','🦷 Toothpaste','🪥 Toothbrushes','💊 Allergy Medicine','👁️ Eye Drops','🩺 Blood Pressure Meds','💊 Prenatal Vitamins','🧻 Feminine Products','☀️ SPF Sunscreen','🧴 Hand Sanitizer','🩻 Ace Bandage','💊 Melatonin','🫁 Inhaler Refill','🧴 Hydrogen Peroxide']
  },
  dollarstore: {
    icon:'🪙', name:'Dollar Tree', desc:'Household · Bins · Decor',
    suggestions:['🗑️ Trash Bags','🧹 Sponges / Scrubbers','🧴 Dish Soap','🧻 Paper Plates','🥄 Plastic Utensils','🕯️ Candles','🖊️ Pens / Markers','📓 Notebooks','🎁 Gift Bags / Wrapping','🪣 Storage Bins','🧺 Small Baskets','🌸 Silk Flowers / Decor','🎉 Party Supplies','📦 Ziploc Bags','🧊 Ice Cube Trays','🧼 Bar Soap','🪴 Fake Plants','🖼️ Picture Frames','🧦 Socks (kids)','🍭 Candy / Treats']
  },
  kids: {
    icon:'🏡', name:'Kids / School', desc:'Back to School · Activities',
    suggestions:['📓 Composition Notebooks','✏️ Pencils (×12)','🖊️ Pens','📏 Ruler','✂️ Scissors','🖍️ Crayons / Colored Pencils','📐 Protractor / Compass','📚 Folders (×5)','🎒 Binder','🗂️ Dividers','💻 Laptop Bag / Case','🖨️ Printer Paper','📎 Paper Clips','🗒️ Sticky Notes','🎨 Art Supplies','🧃 Lunch Box Snacks','🍱 Lunch Box','🧴 Hand Sanitizer (kids)','😷 Extra Masks','🏈 Sports Equipment']
  },
  custom: {
    icon:'📋', name:'My List', desc:'Custom List',
    suggestions:[]
  }
};

let lists=[], items=[], activeListId=null;

function lsGet(k){ try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

async function sbFetch(table,method='GET',body=null,filter=''){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`,{
      method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},
      body:body?JSON.stringify(body):null
    });
    if(!res.ok) return null;
    return method==='DELETE'?null:res.json();
  }catch{return null;}
}

async function init(){
  const data=await sbFetch('lists','GET',null,'?order=created_at.asc');
  lists=data||lsGet('je_lists')||[];
  buildTabs(); renderOverview();
}

function buildTabs(){
  const sel=document.getElementById('listSelector');
  sel.innerHTML='';
  const ov=document.createElement('button');
  ov.className='list-tab'+(activeListId===null?' active':'');
  ov.textContent='✦ All Lists';
  ov.onclick=()=>{ activeListId=null; buildTabs(); showOverview(); };
  sel.appendChild(ov);
  lists.forEach(l=>{
    const btn=document.createElement('button');
    btn.className='list-tab'+(String(l.id)===String(activeListId)?' active':'');
    const sd=STORE_DATA[l.store_type]||STORE_DATA.custom;
    btn.textContent=sd.icon+' '+l.name;
    btn.onclick=()=>selectList(l.id);
    sel.appendChild(btn);
  });
  const nb=document.createElement('button');
  nb.className='new-list-btn'; nb.textContent='+';
  nb.onclick=()=>openForm('newListForm');
  sel.appendChild(nb);
}

function showOverview(){
  document.getElementById('viewOverview').style.display='block';
  document.getElementById('viewList').style.display='none';
  renderOverview();
}

function renderOverview(){
  const grid=document.getElementById('storeGrid');
  if(!lists.length){
    grid.innerHTML='<div class="empty-state" style="grid-column:span 2"><div class="empty-icon">🛒</div><div class="empty-text">"Pick a store and start your list. Shop smarter, not harder." ✦</div></div>';
    return;
  }
  grid.innerHTML=lists.map(l=>{
    const sd=STORE_DATA[l.store_type]||STORE_DATA.custom;
    const listItems=lsGet('je_items_'+l.id)||[];
    const done=listItems.filter(i=>i.checked).length;
    const total=listItems.length;
    const pct=total>0?Math.round((done/total)*100):0;
    return `<div class="store-card" onclick="selectList('${l.id}')">
      <div class="store-icon">${sd.icon}</div>
      <div class="store-name">${l.name}</div>
      <div class="store-desc">${sd.desc}</div>
      <div class="store-progress"><div class="store-progress-fill" style="width:${pct}%"></div></div>
      <div class="store-item-count">${total-done} item${total-done!==1?'s':''} remaining</div>
    </div>`;
  }).join('');
}

async function selectList(id){
  activeListId=id;
  buildTabs();
  const data=await sbFetch('list_items','GET',null,`?list_id=eq.${id}&order=created_at.asc`);
  items=data||lsGet('je_items_'+id)||[];
  document.getElementById('viewOverview').style.display='none';
  document.getElementById('viewList').style.display='block';
  const list=lists.find(l=>String(l.id)===String(id));
  const sd=STORE_DATA[list?.store_type]||STORE_DATA.custom;
  document.getElementById('listViewTitle').textContent=sd.icon+' '+list?.name;
  renderSuggestions(list?.store_type||'custom');
  renderItems();
}

function renderSuggestions(storeType){
  const sd=STORE_DATA[storeType]||STORE_DATA.custom;
  const wrap=document.getElementById('suggestionsWrap');
  const grid=document.getElementById('suggestionsGrid');
  if(!sd.suggestions.length){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  const addedTexts=new Set(items.map(i=>i.text.toLowerCase()));
  grid.innerHTML=sd.suggestions.map(s=>{
    const clean=s.replace(/^[^\s]+\s/,'').split(' (')[0].split(' ×')[0];
    const added=addedTexts.has(s.toLowerCase())||addedTexts.has(clean.toLowerCase());
    return `<span class="suggestion-chip ${added?'added':''}" onclick="addSuggestion('${s.replace(/'/g,"\\'")}',this)">${s}</span>`;
  }).join('');
}

async function addSuggestion(text, btn){
  btn.classList.add('added');
  const obj={text,checked:false,list_id:activeListId,priority:'normal',qty:'×1'};
  const res=await sbFetch('list_items','POST',obj);
  const saved=res&&res[0]?res[0]:{...obj,id:Date.now().toString()};
  items.push(saved); lsSet('je_items_'+activeListId,items);
  renderItems(); showToast(text.split(' ').slice(1).join(' ')||text+' added ✦'); spawnSparkles();
}

function renderItems(){
  const el=document.getElementById('itemsList');
  const sorted=[...items.filter(i=>!i.checked),...items.filter(i=>i.checked)];
  if(!sorted.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">"Tap a suggestion above or type to add items." ✦</div></div>';
    updateStats(); return;
  }
  el.innerHTML=sorted.map(i=>`
    <div class="list-item ${i.checked?'checked':''}">
      <div class="item-check ${i.checked?'checked':''}" onclick="toggleItem('${i.id}')">✓</div>
      <div class="item-text">${i.text}</div>
      ${i.qty&&i.qty!=='×1'?`<span class="item-qty">${i.qty}</span>`:''}
      <span class="item-flag">${i.priority==='high'?'🔥':''}</span>
      <button class="item-del" onclick="deleteItem('${i.id}')">🗑️</button>
    </div>`).join('');
  updateStats();
}

function updateStats(){
  const done=items.filter(i=>i.checked).length;
  document.getElementById('statTotal').textContent=items.length;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statLeft').textContent=items.length-done;
  lsSet('je_items_'+activeListId,items);
  renderOverview();
}

async function createList(){
  const name=document.getElementById('newListName').value.trim();
  const store_type=document.getElementById('newListStore').value;
  if(!name) return;
  const obj={name,store_type};
  const res=await sbFetch('lists','POST',obj);
  const saved=res&&res[0]?res[0]:{...obj,id:Date.now().toString()};
  lists.push(saved); lsSet('je_lists',lists);
  closeForm('newListForm'); document.getElementById('newListName').value='';
  buildTabs(); showToast('List created ✦'); spawnSparkles();
  selectList(saved.id);
}

async function quickAdd(){
  const text=document.getElementById('quickInput').value.trim();
  const qty=document.getElementById('quickQtySelect').value;
  if(!text||!activeListId) return;
  const obj={text,qty,checked:false,list_id:activeListId,priority:'normal'};
  const res=await sbFetch('list_items','POST',obj);
  const saved=res&&res[0]?res[0]:{...obj,id:Date.now().toString()};
  items.push(saved);
  document.getElementById('quickInput').value='';
  renderItems(); showToast(text+' added ✦'); spawnSparkles();
}

async function addDetailItem(){
  const text=document.getElementById('detailItem').value.trim();
  const qty=document.getElementById('detailQty').value.trim();
  const note=document.getElementById('detailNote').value.trim();
  if(!text||!activeListId) return;
  const obj={text:text+(note?' ('+note+')':''),qty,checked:false,list_id:activeListId,priority:'normal'};
  const res=await sbFetch('list_items','POST',obj);
  const saved=res&&res[0]?res[0]:{...obj,id:Date.now().toString()};
  items.push(saved);
  closeForm('detailForm');
  ['detailItem','detailQty','detailNote'].forEach(id=>document.getElementById(id).value='');
  renderItems(); showToast('Added ✦'); spawnSparkles();
}

async function toggleItem(id){
  const item=items.find(x=>String(x.id)===String(id)); if(!item) return;
  item.checked=!item.checked;
  await sbFetch('list_items','PATCH',{checked:item.checked},`?id=eq.${id}`);
  renderItems();
  if(item.checked){ showToast('Got it ✦'); spawnSparkles(); }
}

async function deleteItem(id){
  items=items.filter(x=>String(x.id)!==String(id));
  await sbFetch('list_items','DELETE',null,`?id=eq.${id}`);
  renderItems();
}

async function clearChecked(){
  const toDelete=items.filter(i=>i.checked);
  items=items.filter(i=>!i.checked);
  await Promise.all(toDelete.map(i=>sbFetch('list_items','DELETE',null,`?id=eq.${i.id}`)));
  lsSet('je_items_'+activeListId,items);
  const list=lists.find(l=>String(l.id)===String(activeListId));
  renderSuggestions(list?.store_type||'custom');
  renderItems(); showToast('Cleared ✦ Fresh start!');
}

function openForm(id){document.getElementById(id).classList.add('visible');}
function closeForm(id){document.getElementById(id).classList.remove('visible');}

function spawnSparkles(){
  const s=['✦','✧','⋆','🛒','⭑'],c=['#C4714F','#D4A574','#B8896E'];
  for(let i=0;i<6;i++){
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=s[Math.floor(Math.random()*s.length)];
    el.style.cssText=`left:${20+Math.random()*60}vw;top:${15+Math.random()*55}vh;color:${c[Math.floor(Math.random()*c.length)]};font-size:${12+Math.random()*14}px;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1600);
  }
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

init();
</script>
