<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J Empire · Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --cream:#F4EFE8; --cream-deep:#EDE6DC;
  --terra:#C4714F; --terra-light:#D4906E;
  --rose-gold:#B8896E; --rose-light:#D4A574;
  --brown-dark:#2C1A0E; --brown-mid:#6B4232;
  --brown-muted:#9A6E58; --brown-soft:#C4A090;
  --white-warm:rgba(255,252,248,0.95);
  --green:#5A8A5E;
}
body { min-height:100vh; font-family:'Inter',sans-serif; background:var(--cream-deep); color:var(--brown-dark); }

.header { position:relative; overflow:hidden; padding:48px 24px 28px; text-align:center; background:var(--cream); background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(180,140,105,0.07) 3px,rgba(180,140,105,0.07) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(180,140,105,0.05) 3px,rgba(180,140,105,0.05) 4px); }
.header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,transparent,var(--terra) 20%,var(--rose-light) 50%,var(--rose-gold) 80%,transparent); }
.header-marble { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.header-glow { position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 85% 10%,rgba(196,113,79,0.15) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 10% 85%,rgba(184,137,110,0.11) 0%,transparent 50%); }
.bracket { position:absolute; width:24px; height:24px; opacity:0.3; }
.btl { top:14px; left:16px; border-top:1.5px solid var(--terra); border-left:1.5px solid var(--terra); }
.btr { top:14px; right:16px; border-top:1.5px solid var(--terra); border-right:1.5px solid var(--terra); }
.header-content { position:relative; z-index:2; }
.header-eyebrow { font-size:9px; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:var(--rose-gold); margin-bottom:6px; }
.header-title { font-family:'Cormorant Garamond',serif; font-size:44px; font-weight:300; color:var(--brown-dark); line-height:0.95; letter-spacing:0.06em; margin-bottom:10px; }
.header-title em { font-style:italic; color:var(--terra); }
.header-divider { display:flex; align-items:center; gap:8px; width:160px; margin:0 auto 10px; }
.hdl { flex:1; height:1px; background:rgba(196,113,79,0.3); }
.hdg { width:4px; height:4px; background:var(--terra); transform:rotate(45deg); opacity:0.7; }
.header-quote { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--brown-muted); }

/* FILTER BAR */
.filter-bar { background:var(--cream); border-bottom:1px solid rgba(196,113,79,0.15); padding:10px 16px; display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-tab { font-size:9.5px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; padding:7px 14px; border-radius:20px; border:1px solid rgba(196,113,79,0.22); background:transparent; color:var(--brown-muted); cursor:pointer; transition:all 0.18s; font-family:'Inter',sans-serif; white-space:nowrap; }
.filter-tab.active { background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border-color:transparent; box-shadow:0 3px 10px rgba(196,113,79,0.28); }

/* DUMP INPUT */
.dump-input-wrap { padding:14px 16px; background:var(--cream); border-bottom:1px solid rgba(196,113,79,0.1); }
.dump-box { background:var(--white-warm); border:1.5px solid rgba(196,113,79,0.22); border-radius:16px; padding:13px 15px; box-shadow:0 2px 10px rgba(196,113,79,0.07); transition:border-color 0.18s; }
.dump-box:focus-within { border-color:var(--terra); }
.dump-textarea { width:100%; border:none; background:transparent; resize:none; font-family:'Inter',sans-serif; font-size:14px; color:var(--brown-dark); outline:none; min-height:72px; line-height:1.6; }
.dump-textarea::placeholder { color:var(--brown-soft); font-style:italic; }
.dump-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:10px; flex-wrap:wrap; gap:8px; }
.dump-tags { display:flex; gap:6px; flex-wrap:wrap; }
.dump-tag-btn { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; padding:5px 11px; border-radius:14px; border:1px solid rgba(196,113,79,0.22); background:transparent; color:var(--brown-muted); cursor:pointer; transition:all 0.15s; font-family:'Inter',sans-serif; }
.dump-tag-btn.selected { background:rgba(196,113,79,0.12); color:var(--terra); border-color:rgba(196,113,79,0.4); }
.dump-save-btn { padding:9px 20px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.1em; cursor:pointer; box-shadow:0 3px 10px rgba(196,113,79,0.3); transition:all 0.18s; white-space:nowrap; }
.dump-save-btn:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(196,113,79,0.4); }

/* PLANNER MATCH ALERT */
.planner-match { background:rgba(90,138,94,0.1); border:1.5px solid rgba(90,138,94,0.3); border-radius:14px; padding:12px 16px; margin:10px 16px 0; display:none; align-items:flex-start; gap:10px; }
.planner-match.visible { display:flex; }
.pm-icon { font-size:22px; flex-shrink:0; }
.pm-text { flex:1; }
.pm-title { font-size:11px; font-weight:700; color:var(--green); margin-bottom:3px; letter-spacing:0.06em; }
.pm-matches { font-size:12px; color:var(--brown-dark); line-height:1.5; }
.pm-link { font-size:10px; font-weight:600; color:var(--green); text-decoration:none; display:inline-block; margin-top:4px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:12px 16px; }
.stat-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.14); border-radius:12px; padding:10px 6px; text-align:center; }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra); }
.stat-label { font-size:8px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--brown-muted); margin-top:1px; }

/* NOTES */
.notes-wrap { padding:0 16px 100px; max-width:500px; margin:0 auto; }
.section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-top:4px; }
.section-title { font-size:9px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase; color:var(--rose-gold); display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; display:block; width:30px; height:1px; background:rgba(196,113,79,0.25); }

.notes-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.note-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.15); border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(196,113,79,0.06); display:flex; flex-direction:column; gap:7px; transition:all 0.18s; }
.note-card:hover { box-shadow:0 6px 18px rgba(196,113,79,0.12); border-color:rgba(196,113,79,0.3); }
.note-card.pinned { border-color:rgba(196,113,79,0.38); background:linear-gradient(135deg,rgba(255,252,248,1),rgba(246,234,224,0.6)); }
.note-card.full-span { grid-column:span 2; }
.note-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
.note-cat { font-size:8.5px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--terra); background:rgba(196,113,79,0.1); padding:3px 8px; border-radius:9px; flex-shrink:0; }
.note-pin { font-size:13px; cursor:pointer; opacity:0.45; transition:opacity 0.18s; background:none; border:none; padding:0; }
.note-pin:hover { opacity:1; }
.note-pin.active { opacity:1; }
.note-text { font-size:13px; line-height:1.6; color:var(--brown-dark); word-break:break-word; }
.note-text.truncated { display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
.note-footer { display:flex; align-items:center; justify-content:space-between; }
.note-date { font-size:9px; color:var(--brown-soft); }
.note-del { background:none; border:none; font-size:12px; cursor:pointer; opacity:0.4; transition:opacity 0.18s; }
.note-del:hover { opacity:1; }

.empty-state { grid-column:span 2; text-align:center; padding:36px 16px; }
.empty-icon { font-size:38px; margin-bottom:10px; opacity:0.4; }
.empty-text { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:var(--brown-muted); line-height:1.6; }

.sparkle { position:fixed; pointer-events:none; z-index:9999; animation:sparkle-fly 1.2s ease-out forwards; }
@keyframes sparkle-fly { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}100%{opacity:0;transform:translateY(-80px) scale(0.3) rotate(180deg);} }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); padding:10px 22px; border-radius:24px; font-size:12px; font-weight:600; letter-spacing:0.08em; box-shadow:0 6px 20px rgba(196,113,79,0.4); opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.nav-bar { position:fixed; bottom:0; left:0; right:0; background:var(--cream); border-top:1px solid rgba(196,113,79,0.15); padding:10px 20px 18px; display:flex; justify-content:space-around; align-items:center; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-soft); transition:color 0.18s; }
.nav-item.active { color:var(--terra); }
.nav-icon { font-size:20px; }
</style>
</head>
<body>

<div class="header">
  <svg class="header-marble" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <filter id="mf"><feGaussianBlur stdDeviation="2.5"/></filter>
    <g filter="url(#mf)">
      <path d="M -10 70 Q 80 35 170 85 Q 270 145 360 70 Q 430 15 520 65" stroke="rgba(184,137,110,0.28)" stroke-width="2.5" fill="none"/>
      <path d="M 40 160 Q 130 120 200 158 Q 295 205 385 145" stroke="rgba(196,113,79,0.16)" stroke-width="1.5" fill="none"/>
    </g>
  </svg>
  <div class="header-glow"></div>
  <div class="bracket btl"></div><div class="bracket btr"></div>
  <div class="header-content">
    <div class="header-eyebrow">My Anchor · J Empire</div>
    <div class="header-title">🤍 <em>Brain Dump</em></div>
    <div class="header-divider"><div class="hdl"></div><div class="hdg"></div><div class="hdl"></div></div>
    <div class="header-quote">"Too busy to plan it now? Capture it here." ✦</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="filter-tab active" onclick="setFilter('all',this)">✦ All</button>
  <button class="filter-tab" onclick="setFilter('Money',this)">💰 Money</button>
  <button class="filter-tab" onclick="setFilter('Bills',this)">📩 Bills</button>
  <button class="filter-tab" onclick="setFilter('Appointments',this)">🗓️ Appts</button>
  <button class="filter-tab" onclick="setFilter('Kids',this)">🏡 Kids</button>
  <button class="filter-tab" onclick="setFilter('Notes',this)">📋 Notes</button>
  <button class="filter-tab" onclick="setFilter('Random',this)">💭 Random</button>
  <button class="filter-tab" onclick="setFilter('Pinned',this)">📌 Pinned</button>
</div>

<!-- INPUT -->
<div class="dump-input-wrap">
  <div class="dump-box">
    <textarea class="dump-textarea" id="dumpText" placeholder="Whatever's on your mind... capture it here. ✦" oninput="checkPlannerMatch(this.value)"></textarea>
    <div class="dump-bottom">
      <div class="dump-tags">
        <button class="dump-tag-btn selected" data-tag="Notes" onclick="selectTag(this)">📋 Notes</button>
        <button class="dump-tag-btn" data-tag="Money" onclick="selectTag(this)">💰 Money</button>
        <button class="dump-tag-btn" data-tag="Bills" onclick="selectTag(this)">📩 Bills</button>
        <button class="dump-tag-btn" data-tag="Appointments" onclick="selectTag(this)">🗓️ Appt</button>
        <button class="dump-tag-btn" data-tag="Kids" onclick="selectTag(this)">🏡 Kids</button>
        <button class="dump-tag-btn" data-tag="Random" onclick="selectTag(this)">💭 Random</button>
      </div>
      <button class="dump-save-btn" onclick="saveDump()">Dump It ✦</button>
    </div>
  </div>
</div>

<!-- PLANNER MATCH ALERT -->
<div class="planner-match" id="plannerMatch">
  <div class="pm-icon">🔔</div>
  <div class="pm-text">
    <div class="pm-title">Already on your Planner!</div>
    <div class="pm-matches" id="plannerMatchText"></div>
    <a class="pm-link" href="https://polite-marzipan-ab3f79.netlify.app">→ View in Planner</a>
  </div>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="statAll">0</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" id="statKids">0</div><div class="stat-label">Kids</div></div>
  <div class="stat-card"><div class="stat-num" id="statPinned">0</div><div class="stat-label">Pinned</div></div>
  <div class="stat-card"><div class="stat-num" id="statToday">0</div><div class="stat-label">Today</div></div>
</div>

<!-- NOTES -->
<div class="notes-wrap">
  <div class="section-hdr">
    <div class="section-title">Your Thoughts</div>
  </div>
  <div class="notes-grid" id="notesGrid"></div>
</div>

<div class="toast" id="toast"></div>

<div class="nav-bar">
  <a class="nav-item" href="https://jolly-squirrel-4b0ee5.netlify.app"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a class="nav-item" href="https://polite-marzipan-ab3f79.netlify.app"><span class="nav-icon">🗓️</span><span>Planner</span></a>
  <a class="nav-item active" href="#"><span class="nav-icon">🤍</span><span>Brain Dump</span></a>
</div>

<script>

const SUPABASE_URL='https://ejseathlglvvnmkpchib.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqc2VhdGhsZ2x2dm5ta3BjaGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc4NTUsImV4cCI6MjA5NzU2Mzg1NX0.o4crd1W5-NbVNXSOWNT-WPHS7R6orRe9CRYFZfZ41L8';
async function sbFetch(table,method='GET',body=null,filter=''){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`,{
      method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},
      body:body?JSON.stringify(body):null
    });
    if(!res.ok)return null;
    return method==='DELETE'?null:res.json();
  }catch{return null;}
}

const CAT_EMOJI={Notes:'📋',Money:'💰',Bills:'📩',Appointments:'🗓️',Kids:'🏡',Random:'💭'};
const STORAGE_KEY = 'je_braindump_v2'; // versioned key for clean persistence

let notes = [], activeFilter = 'all', selectedTag = 'Notes';

// ── PERSISTENCE: always load from localStorage ──
function loadNotes(){
  notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  renderNotes(); updateStats();
}

function saveNotes(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

function getDateKey(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(ts){ const d=new Date(ts); return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate(); }

// ── PLANNER MATCH: check if dump text matches any planner events ──
function checkPlannerMatch(text){
  if(text.length < 4){ hidePlannerMatch(); return; }
  const words = text.toLowerCase().split(/\s+/).filter(w=>w.length>3);
  if(!words.length){ hidePlannerMatch(); return; }

  // Scan all planner events from localStorage
  const matches = [];
  const today = new Date();
  // Check next 30 days of planner data
  for(let i=0; i<=30; i++){
    const d = new Date(today); d.setDate(d.getDate()+i);
    const dk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dayEvents = JSON.parse(localStorage.getItem('je_events_'+dk)||'[]');
    dayEvents.forEach(ev=>{
      const evText = (ev.title||'').toLowerCase();
      const hasMatch = words.some(w => evText.includes(w));
      if(hasMatch){
        const dateStr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();
        matches.push(`${ev.title} — ${dateStr}`);
      }
    });
  }

  if(matches.length){
    document.getElementById('plannerMatch').classList.add('visible');
    document.getElementById('plannerMatchText').innerHTML = matches.slice(0,3).map(m=>`<div>✦ ${m}</div>`).join('');
  } else {
    hidePlannerMatch();
  }
}

function hidePlannerMatch(){
  document.getElementById('plannerMatch').classList.remove('visible');
}

function selectTag(btn){
  document.querySelectorAll('.dump-tag-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTag = btn.dataset.tag;
}

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNotes();
}

function saveDump(){
  const text = document.getElementById('dumpText').value.trim();
  if(!text) return;
  const note = {
    id: Date.now().toString(),
    text,
    category: selectedTag,
    pinned: false,
    date_key: getDateKey(),
    created_at: new Date().toISOString()
  };
  notes.unshift(note);
  saveNotes(); // persist immediately to localStorage
  document.getElementById('dumpText').value='';
  hidePlannerMatch();
  renderNotes(); updateStats();
  showToast('Dumped ✦ Your mind is clearer now');
  spawnSparkles();
}

function togglePin(id){
  const n = notes.find(x=>x.id===id); if(!n) return;
  n.pinned = !n.pinned;
  saveNotes();
  renderNotes(); updateStats();
  showToast(n.pinned?'Pinned ✦':'Unpinned');
}

function deleteNote(id){
  notes = notes.filter(x=>x.id!==id);
  saveNotes();
  renderNotes(); updateStats();
  showToast('Cleared ✦');
}

function renderNotes(){
  const grid = document.getElementById('notesGrid');
  let filtered = notes;
  if(activeFilter==='Pinned') filtered = notes.filter(n=>n.pinned);
  else if(activeFilter!=='all') filtered = notes.filter(n=>n.category===activeFilter);

  if(!filtered.length){
    const msgs = {
      all:'"Too much on your mind? Drop it here. You\'ve got this." ✦',
      Money:'"Every dollar tracked is a dollar working for you." ✦',
      Bills:'"Stay ahead of it. One bill at a time." ✦',
      Appointments:'"Your time is valuable. Don\'t miss a thing." ✦',
      Kids:'"They\'re always the priority. Capture it here." ✦',
      Notes:'"Jot it down before it slips away." ✦',
      Random:'"No filter needed. Just get it out." ✦',
      Pinned:'"Pin your most important thoughts here." ✦'
    };
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🤍</div><div class="empty-text">${msgs[activeFilter]||msgs.all}</div></div>`;
    return;
  }

  // Pinned first
  const sorted = [...filtered.filter(n=>n.pinned), ...filtered.filter(n=>!n.pinned)];

  grid.innerHTML = sorted.map((n,i)=>{
    const long = n.text.length > 120;
    const isWide = n.text.length > 200 || (i===0&&n.pinned);
    return `<div class="note-card ${n.pinned?'pinned':''} ${isWide?'full-span':''}">
      <div class="note-top">
        <span class="note-cat">${CAT_EMOJI[n.category]||'✦'} ${n.category||'Note'}</span>
        <button class="note-pin ${n.pinned?'active':''}" onclick="togglePin('${n.id}')">📌</button>
      </div>
      <div class="note-text ${long&&!isWide?'truncated':'full'}">${n.text}</div>
      <div class="note-footer">
        <span class="note-date">${fmtDate(n.created_at)}</span>
        <button class="note-del" onclick="deleteNote('${n.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  const today = getDateKey();
  document.getElementById('statAll').textContent = notes.length;
  document.getElementById('statKids').textContent = notes.filter(n=>n.category==='Kids').length;
  document.getElementById('statPinned').textContent = notes.filter(n=>n.pinned).length;
  document.getElementById('statToday').textContent = notes.filter(n=>n.date_key===today).length;
}

function spawnSparkles(){
  const s=['✦','✧','⋆','🤍','⭑'],c=['#C4714F','#D4A574','#B8896E'];
  for(let i=0;i<7;i++){
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=s[Math.floor(Math.random()*s.length)];
    el.style.cssText=`left:${20+Math.random()*60}vw;top:${15+Math.random()*55}vh;color:${c[Math.floor(Math.random()*c.length)]};font-size:${12+Math.random()*14}px;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1600);
  }
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

loadNotes();
</script>
