<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J Empire · Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --cream:#F4EFE8; --cream-deep:#EDE6DC;
  --terra:#C4714F; --terra-light:#D4906E;
  --rose-gold:#B8896E; --rose-light:#D4A574;
  --brown-dark:#2C1A0E; --brown-mid:#6B4232;
  --brown-muted:#9A6E58; --brown-soft:#C4A090;
  --white-warm:rgba(255,252,248,0.95);
  --green:#5A8A5E; --green-light:rgba(90,138,94,0.15);
  --payday:#5A8A5E; --payday-bg:rgba(90,138,94,0.18);
  --dayoff:#8B6914; --dayoff-bg:rgba(196,163,110,0.2);
  --football:#C4714F; --football-bg:rgba(196,113,79,0.15);
}
body { min-height:100vh; font-family:'Inter',sans-serif; background:var(--cream-deep); color:var(--brown-dark); }

/* HEADER */
.header { position:relative; overflow:hidden; padding:44px 24px 24px; text-align:center; background:var(--cream); background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(180,140,105,0.07) 3px,rgba(180,140,105,0.07) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(180,140,105,0.05) 3px,rgba(180,140,105,0.05) 4px); }
.header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,transparent,var(--terra) 20%,var(--rose-light) 50%,var(--rose-gold) 80%,transparent); }
.header-marble { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.header-glow { position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 85% 10%,rgba(196,113,79,0.14) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 10% 85%,rgba(184,137,110,0.1) 0%,transparent 50%); }
.bracket { position:absolute; width:22px; height:22px; opacity:0.3; }
.btl { top:12px; left:14px; border-top:1.5px solid var(--terra); border-left:1.5px solid var(--terra); }
.btr { top:12px; right:14px; border-top:1.5px solid var(--terra); border-right:1.5px solid var(--terra); }
.header-content { position:relative; z-index:2; }
.header-eyebrow { font-size:9px; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:var(--rose-gold); margin-bottom:5px; }
.header-title { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:300; color:var(--brown-dark); line-height:0.92; letter-spacing:0.06em; margin-bottom:8px; }
.header-title em { font-style:italic; color:var(--terra); }
.header-divider { display:flex; align-items:center; gap:8px; width:140px; margin:0 auto 8px; }
.hdl { flex:1; height:1px; background:rgba(196,113,79,0.3); }
.hdg { width:4px; height:4px; background:var(--terra); transform:rotate(45deg); opacity:0.7; }
.header-quote { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--brown-muted); }

/* VIEW TOGGLE */
.view-toggle { background:var(--cream); border-bottom:1px solid rgba(196,113,79,0.15); padding:10px 16px; display:flex; gap:7px; }
.view-btn { flex:1; padding:8px; border-radius:14px; border:1px solid rgba(196,113,79,0.22); background:transparent; color:var(--brown-muted); font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.18s; font-family:'Inter',sans-serif; }
.view-btn.active { background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border-color:transparent; box-shadow:0 3px 10px rgba(196,113,79,0.28); }

/* DATE NAV */
.date-nav { background:var(--cream); border-bottom:1px solid rgba(196,113,79,0.1); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; }
.nav-btn { width:32px; height:32px; border-radius:50%; border:1px solid rgba(196,113,79,0.25); background:var(--white-warm); color:var(--terra); font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.18s; }
.nav-btn:hover { background:var(--terra); color:var(--cream); }
.nav-center { text-align:center; }
.nav-day { font-family:'Cormorant Garamond',serif; font-size:21px; color:var(--brown-dark); }
.nav-date { font-size:9.5px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--brown-muted); margin-top:1px; }

/* LEGEND */
.legend { background:var(--cream); padding:8px 16px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid rgba(196,113,79,0.1); }
.legend::-webkit-scrollbar { display:none; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:9px; font-weight:600; color:var(--brown-muted); white-space:nowrap; letter-spacing:0.06em; flex-shrink:0; }
.legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.ld-payday { background:var(--payday); }
.ld-dayoff { background:var(--dayoff); }
.ld-football { background:var(--football); }
.ld-event { background:var(--rose-gold); }

/* WEEK STRIP */
.week-strip { background:var(--cream); padding:8px 10px 10px; border-bottom:1px solid rgba(196,113,79,0.1); display:flex; gap:4px; }
.week-day { flex:1; text-align:center; padding:6px 2px; border-radius:11px; cursor:pointer; transition:all 0.18s; border:1px solid transparent; }
.week-day:hover { background:rgba(196,113,79,0.08); }
.week-day.active { background:linear-gradient(135deg,var(--terra),var(--terra-light)); }
.week-day.payday { background:var(--payday-bg); border-color:rgba(90,138,94,0.3); }
.week-day.payday.active { background:linear-gradient(135deg,var(--payday),#7AAE7E); border-color:transparent; }
.week-day.dayoff { background:var(--dayoff-bg); border-color:rgba(139,105,20,0.25); }
.week-day.football-day { background:var(--football-bg); border-color:rgba(196,113,79,0.25); }
.wdl { font-size:8px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-muted); margin-bottom:2px; }
.week-day.active .wdl { color:rgba(255,252,248,0.8); }
.week-day.payday .wdl { color:var(--payday); }
.week-day.dayoff .wdl { color:var(--dayoff); }
.wdn { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--brown-dark); line-height:1; }
.week-day.active .wdn { color:var(--cream); }
.week-day-emojis { font-size:9px; min-height:13px; margin-top:2px; }

/* MAIN */
.main { padding:16px 16px 100px; max-width:500px; margin:0 auto; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.stat-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.14); border-radius:13px; padding:11px 8px; text-align:center; box-shadow:0 1px 6px rgba(196,113,79,0.05); }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--terra); }
.stat-label { font-size:8px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--brown-muted); margin-top:1px; }

/* SECTION HDR */
.section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.section-title { font-size:9px; font-weight:700; letter-spacing:0.24em; text-transform:uppercase; color:var(--rose-gold); display:flex; align-items:center; gap:7px; }
.section-title::after { content:''; display:block; width:26px; height:1px; background:rgba(196,113,79,0.25); }
.add-btn { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--terra); background:rgba(196,113,79,0.1); padding:5px 11px; border-radius:18px; cursor:pointer; border:none; font-family:'Inter',sans-serif; transition:all 0.18s; }
.add-btn:hover { background:var(--terra); color:var(--cream); }

/* TIME BLOCKS */
.time-blocks { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; }
.time-block { display:flex; gap:10px; align-items:flex-start; }
.tbl { font-size:9px; font-weight:600; letter-spacing:0.06em; color:var(--brown-muted); width:42px; flex-shrink:0; padding-top:13px; text-align:right; }
.time-line { display:flex; flex-direction:column; align-items:center; flex-shrink:0; padding-top:11px; }
.time-dot { width:7px; height:7px; border-radius:50%; background:rgba(196,113,79,0.22); }
.time-connector { width:1px; flex:1; min-height:18px; background:rgba(196,113,79,0.1); margin-top:3px; }
.time-event-area { flex:1; }
.event-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.16); border-left:3px solid var(--terra); border-radius:0 11px 11px 0; padding:9px 38px 9px 12px; margin-bottom:5px; box-shadow:0 1px 6px rgba(196,113,79,0.06); cursor:pointer; transition:all 0.18s; position:relative; }
.event-card:hover { transform:translateX(2px); }
.event-card.payday-card { border-left-color:var(--payday); background:var(--payday-bg); }
.event-card.dayoff-card { border-left-color:var(--dayoff); background:var(--dayoff-bg); }
.event-card.football-card { border-left-color:var(--football); background:var(--football-bg); }
.event-card.done { opacity:0.5; }
.event-card.done .ev-title { text-decoration:line-through; }
.ev-title { font-size:12px; font-weight:600; color:var(--brown-dark); }
.ev-meta { font-size:9.5px; color:var(--brown-muted); display:flex; gap:6px; margin-top:2px; flex-wrap:wrap; }
.ev-tag { font-size:8px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:1px 7px; border-radius:8px; background:rgba(196,113,79,0.1); color:var(--terra); }
.ev-tag.payday-tag { background:var(--green-light); color:var(--payday); }
.ev-tag.dayoff-tag { background:var(--dayoff-bg); color:var(--dayoff); }
.ev-tag.football-tag { background:var(--football-bg); color:var(--football); }
.ev-check { position:absolute; right:10px; top:50%; transform:translateY(-50%); width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(196,113,79,0.3); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.18s; font-size:10px; color:transparent; }
.ev-check.checked { background:var(--terra); border-color:var(--terra); color:white; }
.empty-slot { border:1.5px dashed rgba(196,113,79,0.18); border-radius:0 11px 11px 0; padding:9px 12px; color:rgba(196,113,79,0.35); font-size:11px; font-style:italic; cursor:pointer; transition:all 0.18s; }
.empty-slot:hover { border-color:rgba(196,113,79,0.45); color:var(--terra); }
.ev-del-btn { position:absolute; right:34px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:13px; cursor:pointer; opacity:0.4; transition:opacity 0.18s; padding:2px; }
.ev-del-btn:hover { opacity:1; }
.ev-edit-btn { position:absolute; right:58px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:12px; cursor:pointer; opacity:0.45; transition:opacity 0.18s; padding:2px; }
.ev-edit-btn:hover { opacity:1; }

/* TODOS */
.todo-list { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
.todo-item { background:var(--white-warm); border:1px solid rgba(196,113,79,0.14); border-radius:12px; padding:10px 13px; display:flex; align-items:center; gap:10px; box-shadow:0 1px 5px rgba(196,113,79,0.04); cursor:pointer; transition:all 0.16s; }
.todo-item.done { opacity:0.45; }
.todo-item.done .todo-text { text-decoration:line-through; }
.todo-check { width:20px; height:20px; border-radius:5px; border:1.5px solid rgba(196,113,79,0.35); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent; transition:all 0.18s; }
.todo-check.checked { background:var(--terra); border-color:var(--terra); color:white; }
.todo-text { font-size:12px; font-weight:500; color:var(--brown-dark); flex:1; }
.todo-priority { font-size:12px; flex-shrink:0; }

/* ── MONTH VIEW ── */
.month-view { display:none; padding:14px 12px 100px; max-width:500px; margin:0 auto; }
.month-view.visible { display:block; }
.month-header { text-align:center; margin-bottom:12px; }
.month-title { font-family:'Cormorant Garamond',serif; font-size:24px; color:var(--brown-dark); }
.month-dow { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:4px; }
.month-dow-label { text-align:center; font-size:8.5px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--rose-gold); padding:3px 0; }
.month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.month-cell { border-radius:9px; background:var(--white-warm); border:1px solid rgba(196,113,79,0.1); min-height:52px; padding:4px 3px 3px; cursor:pointer; transition:all 0.16s; position:relative; display:flex; flex-direction:column; }
.month-cell:hover { border-color:rgba(196,113,79,0.35); box-shadow:0 2px 8px rgba(196,113,79,0.1); }
.month-cell.active { border-color:var(--terra); border-width:2px; }
.month-cell.today { background:rgba(196,113,79,0.07); }
.month-cell.other-month { opacity:0.28; }
.month-cell.empty-cell { background:transparent; border-color:transparent; cursor:default; }
.month-cell.payday-cell { background:var(--payday-bg); border-color:rgba(90,138,94,0.35); }
.month-cell.dayoff-cell { background:var(--dayoff-bg); border-color:rgba(196,163,110,0.35); }
.month-cell.holiday-cell { background:rgba(184,137,110,0.12); border-color:rgba(184,137,110,0.3); }
.mc-num { font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--brown-dark); line-height:1; text-align:right; padding-right:2px; }
.month-cell.active .mc-num { color:var(--terra); font-weight:600; }
.month-cell.payday-cell .mc-num { color:var(--payday); font-weight:600; }
.month-cell.dayoff-cell .mc-num { color:var(--dayoff); font-weight:600; }
.mc-labels { display:flex; flex-direction:column; gap:1px; margin-top:2px; flex:1; }
.mc-label { font-size:7.5px; font-weight:700; padding:1px 3px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }
.mc-label.lbl-payday { background:rgba(90,138,94,0.25); color:var(--payday); }
.mc-label.lbl-dayoff { background:rgba(196,163,110,0.3); color:var(--dayoff); }
.mc-label.lbl-football { background:rgba(196,113,79,0.2); color:var(--terra); }
.mc-label.lbl-appt { background:rgba(184,137,110,0.2); color:var(--rose-gold); }
.mc-label.lbl-bill { background:rgba(196,113,79,0.12); color:var(--brown-muted); }
.mc-label.lbl-holiday { background:rgba(184,137,110,0.15); color:var(--brown-muted); }
.mc-label.lbl-activity { background:rgba(196,113,79,0.12); color:var(--brown-mid); }
.mc-label.lbl-event { background:rgba(196,113,79,0.1); color:var(--brown-muted); }

/* FORMS */
.add-form { background:var(--white-warm); border:1px solid rgba(196,113,79,0.2); border-radius:15px; padding:14px; margin-bottom:14px; display:none; flex-direction:column; gap:9px; box-shadow:0 3px 14px rgba(196,113,79,0.09); }
.add-form.visible { display:flex; }
.form-input { width:100%; padding:9px 12px; border:1px solid rgba(196,113,79,0.22); border-radius:9px; background:var(--cream); color:var(--brown-dark); font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:border-color 0.16s; }
.form-input:focus { border-color:var(--terra); }
.form-input::placeholder { color:var(--brown-soft); }
.form-row { display:flex; gap:7px; }
.form-select { flex:1; padding:8px 10px; border:1px solid rgba(196,113,79,0.22); border-radius:9px; background:var(--cream); color:var(--brown-dark); font-family:'Inter',sans-serif; font-size:12px; outline:none; }
.form-btn { padding:9px 18px; border-radius:9px; border:none; font-family:'Inter',sans-serif; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.16s; }
.form-btn-save { background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); box-shadow:0 2px 8px rgba(196,113,79,0.28); }
.form-btn-cancel { background:rgba(196,113,79,0.09); color:var(--brown-muted); }

/* SPARKLE */
.sparkle { position:fixed; pointer-events:none; z-index:9999; animation:sparkle-fly 1.2s ease-out forwards; }
@keyframes sparkle-fly { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}100%{opacity:0;transform:translateY(-80px) scale(0.3) rotate(180deg);} }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); padding:9px 20px; border-radius:22px; font-size:12px; font-weight:600; letter-spacing:0.08em; box-shadow:0 5px 18px rgba(196,113,79,0.38); opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.nav-bar { position:fixed; bottom:0; left:0; right:0; background:var(--cream); border-top:1px solid rgba(196,113,79,0.14); padding:9px 18px 16px; display:flex; justify-content:space-around; align-items:center; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; text-decoration:none; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-soft); transition:color 0.16s; }
.nav-item.active { color:var(--terra); }
.nav-icon { font-size:19px; }
</style>
</head>
<body>

<div class="header">
  <svg class="header-marble" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <filter id="mf"><feGaussianBlur stdDeviation="2.5"/></filter>
    <g filter="url(#mf)">
      <path d="M -10 65 Q 80 30 165 80 Q 265 138 355 65 Q 425 12 515 60" stroke="rgba(184,137,110,0.27)" stroke-width="2.5" fill="none"/>
      <path d="M 38 155 Q 125 115 195 152 Q 290 198 378 140" stroke="rgba(196,113,79,0.15)" stroke-width="1.5" fill="none"/>
    </g>
  </svg>
  <div class="header-glow"></div>
  <div class="bracket btl"></div><div class="bracket btr"></div>
  <div class="header-content">
    <div class="header-eyebrow">My Anchor · J Empire</div>
    <div class="header-title">🗓️ <em>Planner</em></div>
    <div class="header-divider"><div class="hdl"></div><div class="hdg"></div><div class="hdl"></div></div>
    <div class="header-quote">"Your day, your way. Plan it like a queen." ✦</div>
  </div>
</div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <button class="view-btn active" id="btnWeek" onclick="switchView('week')">✦ Week</button>
  <button class="view-btn" id="btnMonth" onclick="switchView('month')">⋆ Month</button>
</div>

<!-- DATE NAV -->
<div class="date-nav">
  <button class="nav-btn" id="navPrev" onclick="navPrev()">‹</button>
  <div class="nav-center">
    <div class="nav-day" id="navDay">Monday</div>
    <div class="nav-date" id="navDate">June 26, 2026</div>
  </div>
  <button class="nav-btn" id="navNext" onclick="navNext()">›</button>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot ld-payday"></div>Payday</div>
  <div class="legend-item"><div class="legend-dot ld-dayoff"></div>Day Off</div>
  <div class="legend-item"><div class="legend-dot ld-football"></div>Football 🏈</div>
  <div class="legend-item"><div class="legend-dot ld-event"></div>Event/Appt</div>
</div>

<!-- WEEK STRIP (week view only) -->
<div class="week-strip" id="weekStrip"></div>

<!-- WEEK VIEW -->
<div id="weekView">
  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statEvents">0</div><div class="stat-label">Events</div></div>
      <div class="stat-card"><div class="stat-num" id="statTodos">0</div><div class="stat-label">To-Dos</div></div>
      <div class="stat-card"><div class="stat-num" id="statDone">0</div><div class="stat-label">Done ✦</div></div>
    </div>

    <!-- EVENT FORM -->
    <div class="add-form" id="eventForm">
      <input class="form-input" id="evTitle" placeholder="What's happening?" />
      <div class="form-row">
        <input class="form-input" id="evTime" type="time" style="flex:1" />
        <select class="form-select" id="evTag">
          <option value="Appt">📋 Appt</option>
          <option value="Payday">💰 Payday</option>
          <option value="Bill Due">📩 Bill Due</option>
          <option value="Day Off">🏖️ Day Off</option>
          <option value="Football">🏈 Football</option>
          <option value="Karate">🥋 Karate</option>
          <option value="Gymnastics">🤸 Gymnastics</option>
          <option value="Dance">💃 Dance</option>
          <option value="School Event">🏫 School Event</option>
          <option value="Kids">🏡 Kids</option>
          <option value="Bills">📩 Bills</option>
          <option value="Gig Work">🚗 Gig Work</option>
          <option value="Other">📋 Other</option>
        </select>
      </div>
      <input class="form-input" id="evNote" placeholder="Details (optional)" />
      <div class="form-row">
        <button class="form-btn form-btn-cancel" onclick="closeForm('eventForm')">Cancel</button>
        <button class="form-btn form-btn-save" onclick="saveEvent()">Save ✦</button>
      </div>

// ── PAYDAY ENGINE ──
// Starting June 12 2026, every 14 days
const PAYDAY_START = new Date('2026-06-12T12:00:00');
function isPayday(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  const diff = Math.round((d - PAYDAY_START)/(1000*60*60*24));
  return diff >= 0 && diff % 14 === 0;
}
function getPaydays(year, month){
  // Returns array of day numbers that are paydays in given month
  const days = [];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for(let d=1; d<=daysInMonth; d++){
    const key = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(isPayday(key)) days.push(d);
  }
  return days;
}

// ── SUPABASE ──
async function sbFetch(table, method='GET', body=null, filter=''){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`,{
      method, headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},
      body: body ? JSON.stringify(body) : null
    });
    if(!res.ok) return null;
    return method==='DELETE' ? null : res.json();
  }catch{ return null; }
}

// ── WEEK STRIP ──
function buildWeekStrip(){
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  for(let i=-3; i<=3; i++){
    const d = new Date(currentDate); d.setDate(d.getDate()+i);
    const key = getDateKey(d);
    const pd = isPayday(key);
    const cached = cache[key];
    let emojis = '';
    if(pd) emojis += '💰';
    if(cached){
      const evEmojis = [...new Set((cached.events||[]).map(e=>TAG_CONFIG[e.tag]?.emoji||'📋'))].filter(x=>x!=='💰').slice(0,2).join('');
      emojis += evEmojis;
    }
    const div = document.createElement('div');
    const classes = ['week-day', i===0?'active':'', pd?'payday':''].filter(Boolean).join(' ');
    div.className = classes;
    div.innerHTML = `<div class="wdl">${DAYS[d.getDay()].slice(0,3)}</div><div class="wdn">${d.getDate()}</div><div class="week-day-emojis">${emojis}</div>`;
    div.onclick = ()=>{ currentDate = new Date(d); updateDateDisplay(); };
    strip.appendChild(div);
  }
}

// ── MONTH GRID ──
function renderMonth(){
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  document.getElementById('navDay').textContent = MONTHS[month];
  document.getElementById('navDate').textContent = year;
  document.getElementById('monthTitle').textContent = MONTHS[month]+' '+year;
  const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = getDateKey(new Date());

  const paydays = getPaydays(year, month);

  for(let i=0;i<firstDay;i++){
    const c=document.createElement('div'); c.className='month-cell empty-cell'; grid.appendChild(c);
  }

  for(let d=1; d<=daysInMonth; d++){
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cellDate = new Date(year,month,d);
    const dow = cellDate.getDay();
    const pd = paydays.includes(d);
    const isHoliday = !!holidays[key];
    const isFootball = FOOTBALL_DAYS_OF_WEEK.includes(dow);
    const cached = cache[key] || {events:JSON.parse(localStorage.getItem('je_events_'+key)||'[]'),todos:JSON.parse(localStorage.getItem('je_todos_'+key)||'[]')};
    const dayOffEvent = (cached.events||[]).find(e=>e.tag==='Day Off');
    const isDayOff = !!dayOffEvent;
    const isActive = getDateKey(cellDate)===getDateKey(currentDate);

    // Build labels
    const labels = [];
    if(pd) labels.push({text:'💰 Payday', cls:'lbl-payday'});
    if(isDayOff) labels.push({text:'🏖️ Day Off', cls:'lbl-dayoff'});
    if(isHoliday) labels.push({text:holidays[key], cls:'lbl-holiday'});
    // Show football only if manually added
    const cachedEventsM = (cache[key]||{}).events || JSON.parse(localStorage.getItem('je_events_'+key)||'[]');
    const hasFootballEvent = cachedEventsM.some(ev=>ev.tag==='Football');
    if(hasFootballEvent) labels.push({text:'🏈 Football', cls:'lbl-football'});
    (cached.events||[]).filter(e=>e.tag!=='Day Off'&&e.tag!=='Payday'&&e.tag!=='Football').slice(0,2).forEach(e=>{

    if(pd) cellClass += ' payday-cell';

    cell.onclick = ()=>{ currentDate = new Date(year,month,d); switchView('week'); };

  }
}

async function saveEvent(){
  const title = document.getElementById('evTitle').value.trim();
  const time = document.getElementById('evTime').value;
  const tag = document.getElementById('evTag').value;
  const note = document.getElementById('evNote').value.trim();
  if(!title) return;
  const hour = time ? parseInt(time.split(':')[0]) : 9;
  const timeLabel = hour<12?'Morning':hour<17?'Afternoon':'Evening';
  const obj = {title,tag,note,time_label:timeLabel,date_key:getDateKey(currentDate),done:false};
  try{
    const res = await sbFetch('planner_events','POST',obj);
    if(res) events.push(res[0]||{...obj,id:Date.now()});
    else throw new Error();
  }catch{ obj.id=Date.now().toString(); events.push(obj); }
  localStorage.setItem('je_events_'+getDateKey(currentDate),JSON.stringify(events));
  cache[getDateKey(currentDate)]={events,todos};
  closeForm('eventForm'); document.getElementById('evTitle').value=''; document.getElementById('evNote').value='';
  renderEvents(); updateStats(); buildWeekStrip();
  showToast('Added ✦'); spawnSparkles();
}

async function toggleEvent(id){
  const ev=events.find(e=>String(e.id)===String(id)); if(!ev) return;
  ev.done=!ev.done;
  await sbFetch('planner_events','PATCH',{done:ev.done},`?id=eq.${id}`);
  localStorage.setItem('je_events_'+getDateKey(currentDate),JSON.stringify(events));
  renderEvents(); updateStats();
  if(ev.done){ showToast('Done! You crushed it ✦'); spawnSparkles(); }
}

  if(e) e.stopPropagation();
  const t = todos.find(x=>String(x.id)===String(id)); if(!t) return;
  document.getElementById('editTodoId').value = id;
  document.getElementById('editTodoText').value = t.text;
  const ps = document.getElementById('editTodoPriority');
  for(let i=0;i<ps.options.length;i++){ if(ps.options[i].value===t.priority){ ps.selectedIndex=i; break; } }
  closeForm('todoForm');
  document.getElementById('editTodoForm').classList.add('visible');
  document.getElementById('editTodoForm').scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function saveEditTodo(){
  const id = document.getElementById('editTodoId').value;
  const text = document.getElementById('editTodoText').value.trim();
  const priority = document.getElementById('editTodoPriority').value;
  if(!text) return;
  const t = todos.find(x=>String(x.id)===String(id)); if(!t) return;
  t.text = text; t.priority = priority;
  const dk = getDateKey(currentDate);
  try{ await sbFetch('planner_todos','PATCH',{text,priority},`?id=eq.${id}`); }catch{}
  localStorage.setItem('je_todos_'+dk, JSON.stringify(todos));
  cache[dk] = {events, todos};
  closeForm('editTodoForm');
  renderTodos(); updateStats();
  showToast('To-do updated ✦'); spawnSparkles();
}

async function toggleTodo(id){
  const t=todos.find(x=>String(x.id)===String(id)); if(!t) return;
  t.done=!t.done;
  await sbFetch('planner_todos','PATCH',{done:t.done},`?id=eq.${id}`);
  localStorage.setItem('je_todos_'+getDateKey(currentDate),JSON.stringify(todos));
  renderTodos(); updateStats();
  if(t.done){ showToast('Task done! Unstoppable ✦'); spawnSparkles(); }
}

function updateStats(){
  document.getElementById('statEvents').textContent=events.filter(e=>!e.auto).length;
  document.getElementById('statTodos').textContent=todos.length;
  document.getElementById('statDone').textContent=[...events,...todos].filter(x=>x.done).length;
}

function openForm(id){document.getElementById(id).classList.add('visible');}
function closeForm(id){document.getElementById(id).classList.remove('visible');}

function spawnSparkles(){
  const s=['✦','✧','⋆','💰','⭑'],c=['#C4714F','#D4A574','#B8896E','#5A8A5E'];
  for(let i=0;i<7;i++){
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=s[Math.floor(Math.random()*s.length)];
    el.style.cssText=`left:${20+Math.random()*60}vw;top:${15+Math.random()*55}vh;color:${c[Math.floor(Math.random()*c.length)]};font-size:${12+Math.random()*14}px;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1600);
  }
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ── DELETE AUTO EVENT ──
function deleteAutoEvent(id, e){
  e.stopPropagation();
  const dk = getDateKey(currentDate);
  // Store deleted auto events so they don't re-appear
  const deleted = JSON.parse(localStorage.getItem('je_deleted_auto')||'{}');
  if(!deleted[dk]) deleted[dk] = [];
  if(!deleted[dk].includes(id)) deleted[dk].push(id);
  localStorage.setItem('je_deleted_auto', JSON.stringify(deleted));
  events = events.filter(ev => String(ev.id) !== String(id));
  // also remove from cache so month view updates
  if(cache[dk]) cache[dk].events = events;
  renderEvents(); updateStats(); buildWeekStrip();
  // if month view is open, re-render it too
  if(currentView === 'month') renderMonth();
  showToast('Football event removed ✦');
}

// ── EDIT AUTO EVENT (reschedule) ──
function rescheduleFootball(id){
  const ev = events.find(e=>String(e.id)===String(id)); if(!ev) return;
  const newTime = prompt('Move to which time slot? (Morning / Afternoon / Evening)', ev.time_label||'Afternoon');
  if(!newTime) return;
  ev.time_label = newTime; ev.auto = false; // make permanent
  const dk = getDateKey(currentDate);
  localStorage.setItem('je_events_'+dk, JSON.stringify(events));
  cache[dk] = {events, todos};
  renderEvents();
  showToast('Rescheduled ✦');
}

// INIT
switchView('week');
updateDateDisplay();
</script>
