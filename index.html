<style>
:root{
  --gold:#D4B978;--gold-lt:#EAD79A;--gold-br:#F6E9B8;--gold-deep:#B0975A;--gold-hair:rgba(212,185,120,.3);
  --ink:#FCFAF6;--ink-mut:#D8CEE6;--ink-soft:#A99EB6;--line:rgba(255,255,255,.11);
  --iris:linear-gradient(135deg,#E8A9CE,#BCA6E8,#9FB4E8);
  --disp:'Fraunces',serif;
  --c-plan:#DDA0C8;--c-follow:#E8A9CE;--c-pay:#E6C766;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;color:var(--ink);max-width:460px;margin:0 auto;min-height:100vh;padding:24px 16px 56px;position:relative;
  background:radial-gradient(38% 26% at 16% 12%,rgba(232,169,206,.15),transparent 70%),radial-gradient(40% 28% at 86% 16%,rgba(159,180,232,.13),transparent 72%),radial-gradient(44% 30% at 60% 94%,rgba(143,216,196,.11),transparent 72%),linear-gradient(170deg,#372C4A 0%,#2E2440 45%,#271E36 100%);
  background-attachment:fixed;}
a{text-decoration:none;color:inherit;}

/* header */
.hdr{text-align:center;margin-bottom:14px;}
.ttl{font-family:'Pinyon Script',cursive;font-size:54px;line-height:.9;margin:2px 0;background:linear-gradient(115deg,var(--gold-br),var(--gold),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));}
.ttl em{font-style:normal;}
.grt{font-family:var(--disp);font-size:26px;font-weight:600;margin-top:4px;}
.quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--gold-lt);margin-top:4px;min-height:22px;transition:opacity .9s ease;}

/* briefing */
#brief{margin:2px 0 4px;padding:15px 17px;border-radius:16px;background:radial-gradient(70% 90% at 15% 10%,rgba(232,169,206,.22),transparent 60%),linear-gradient(160deg,#4A3A66,#3E3158);border:1px solid rgba(199,159,212,.3);}
.b-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.b-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-lt);font-weight:700;}
.b-date{font-size:11px;letter-spacing:.06em;color:var(--ink-mut);font-weight:600;}
.b-line{display:flex;gap:9px;padding:5px 0;}
.b-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:7px;flex-shrink:0;}
.b-txt{font-size:13.5px;color:var(--ink);line-height:1.45;}
.b-src{color:var(--gold-lt);font-weight:600;}
.b-quiet{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--ink-mut);}
.b-skel{height:11px;border-radius:6px;background:linear-gradient(90deg,rgba(255,255,255,.07),rgba(255,255,255,.16),rgba(255,255,255,.07));background-size:200% 100%;animation:sk 1.4s infinite;margin:7px 0;}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* section label */
.glbl{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:22px 2px 4px;display:flex;align-items:center;gap:9px;}
.glbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-hair),transparent);}

/* worlds panels */
.panel{border-radius:20px;padding:18px;margin-top:12px;position:relative;overflow:hidden;border:1px solid var(--line);min-height:112px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 6px 20px rgba(0,0,0,.22);}
.panel .big-em{position:absolute;top:14px;right:16px;font-size:36px;opacity:.85;filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));}
.panel .wname{font-family:var(--disp);font-size:24px;font-weight:600;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.chip{font-size:11.5px;font-weight:600;padding:7px 13px;border-radius:16px;background:rgba(255,255,255,.1);color:var(--ink);border:1px solid rgba(255,255,255,.09);position:relative;}
.chip:active{background:rgba(255,255,255,.18);}
.tw-1{background:radial-gradient(75% 95% at 10% 0%,rgba(221,160,200,.24),transparent 62%),linear-gradient(155deg,#3D3158,#2E2440);}
.tw-2{background:radial-gradient(75% 95% at 10% 0%,rgba(143,200,160,.2),transparent 62%),linear-gradient(155deg,#3D3158,#2E2440);}
.tw-3{background:radial-gradient(75% 95% at 10% 0%,rgba(159,180,232,.22),transparent 62%),linear-gradient(155deg,#3D3158,#2E2440);}
.tw-4{background:radial-gradient(75% 95% at 10% 0%,rgba(230,199,102,.2),transparent 62%),linear-gradient(155deg,#3D3158,#2E2440);}

/* today pulse (bottom) */
.pulse{display:flex;flex-direction:column;gap:9px;margin-top:10px;}
.pit{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.025));}
.pit .bar{width:5px;height:40px;border-radius:4px;flex-shrink:0;background:var(--c-plan);}
.pit .pk{font-size:9px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--c-plan);}
.pit .pv{font-family:var(--disp);font-size:18px;font-weight:600;margin-top:1px;}
.pit .ptime{margin-left:auto;font-size:12px;color:var(--ink-mut);font-weight:600;}
.statrow{display:flex;border-radius:14px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.025));overflow:hidden;}
.sv{flex:1;text-align:center;padding:14px 4px;position:relative;}
.sv+.sv::before{content:'';position:absolute;left:0;top:22%;height:56%;width:1px;background:var(--gold-hair);}
.sv .n{font-family:var(--disp);font-size:26px;font-weight:600;color:var(--gold-lt);line-height:1;}
.sv .l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mut);font-weight:700;margin-top:4px;}

/* floating bubble note */
.floatnote{position:fixed;top:16px;right:14px;z-index:100;width:60px;height:60px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(-6deg);
  background:linear-gradient(150deg,#F0C6E0,#CDB8F0,#AEC4F2,#9FE0D0);color:#2a2038;
  box-shadow:0 6px 18px rgba(190,150,205,.5);animation:bob 2.6s ease-in-out infinite;}
.floatnote .fn-em{font-size:26px;line-height:1;}
.floatnote .fn-lbl{font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.floatnote:active{transform:rotate(4deg) scale(1.08);}
@keyframes bob{0%,100%{transform:rotate(-6deg) translateY(0);}50%{transform:rotate(-6deg) translateY(-7px);}}
@media(prefers-reduced-motion:reduce){.floatnote{animation:none;}}

/* footer */
.foot{text-align:center;margin-top:30px;opacity:.75;}
.foot .mk{font-family:'Pinyon Script',cursive;font-size:26px;color:var(--gold);}
.foot .tg{font-size:10px;letter-spacing:.2em;color:var(--ink-soft);margin-top:2px;}

/* follow-ups badge (iridescent, overrides old rust style) */
.t-follow{position:relative;}
#followBadge{position:absolute !important;top:-6px !important;right:-6px !important;min-width:20px;height:20px;border-radius:10px;
  background:linear-gradient(135deg,#E8A9CE,#9FB4E8) !important;color:#2a1e33 !important;font-size:10px;font-weight:800;
  display:none;align-items:center;justify-content:center;padding:0 5px;border:2px solid #2E2440 !important;box-shadow:0 3px 10px rgba(190,150,205,.5) !important;}
#followBadge.show{display:flex;}
</style>
</head>

<script>
const JE_URL='https://ejseathlglvvnmkpchib.supabase.co';
const JE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqc2VhdGhsZ2x2dm5ta3BjaGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc4NTUsImV4cCI6MjA5NzU2Mzg1NX0.o4crd1W5-NbVNXSOWNT-WPHS7R6orRe9CRYFZfZ41L8';
window.JE_TOKEN=null;

/* ── What you're counting down to. Change freely. ── */
const MILESTONE={label:'To Mediation', date:'2026-07-28'};

/* ── One line per weekday. Sunday first. ── */
const QUOTES=[
  'Rest is part of the plan.',
  'Start where you are.',
  'Small moves, repeated.',
  'You have done harder things.',
  'Almost. Keep going.',
  'Finish it. Then close the laptop.',
  'This is yours.'
];

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ── LOGIN ── */
function jeSave(d){localStorage.setItem('je_session',JSON.stringify({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at}));}
async function jeLogin(){
  const pw=document.getElementById('jePw').value;
  const msg=document.getElementById('jeMsg');
  msg.textContent='Signing in...';
  try{
    const r=await fetch(JE_URL+'/auth/v1/token?grant_type=password',{method:'POST',
      headers:{'apikey':JE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:'jempire@jempire.app',password:pw})});
    if(!r.ok) throw 0;
    jeSave(await r.json()); location.reload();
  }catch(e){msg.textContent='Wrong password — try again';}
}
function jeShowLogin(){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#4A2233,#5C2B3D);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;';
  d.innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:40px;color:#fff;margin-bottom:4px;">J <em style="color:#E8CDA8">Empire</em></div>'
    +'<div style="font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#C9A98C;margin-bottom:26px;">Sign in to continue</div>'
    +'<input id="jePw" type="password" placeholder="Password" style="width:100%;max-width:300px;padding:14px;border-radius:12px;border:1px solid rgba(232,205,168,.35);background:rgba(255,255,255,.96);font-size:16px;margin-bottom:11px;">'
    +'<button onclick="jeLogin()" style="width:100%;max-width:300px;padding:14px;border-radius:12px;border:none;background:#A8536E;color:#fff;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;">Sign In</button>'
    +'<div id="jeMsg" style="font-size:11px;color:#E8CDA8;margin-top:13px;min-height:14px;"></div>';
  document.body.appendChild(d);
  document.getElementById('jePw').addEventListener('keydown',e=>{if(e.key==='Enter')jeLogin();});
}
async function jeRefresh(rt){
  try{
    const r=await fetch(JE_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',
      headers:{'apikey':JE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:rt})});
    if(!r.ok) throw 0;
    jeSave(await r.json()); location.reload();
  }catch(e){jeShowLogin();}
}

/* ── DATA ── */
async function sb(path){
  const r=await fetch(JE_URL+'/rest/v1/'+path,{
    headers:{apikey:JE_KEY, Authorization:'Bearer '+(window.JE_TOKEN||JE_KEY)}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
function briefLine(raw){
  let t=raw.replace(/^[-*•]\s*/,'').trim();
  if(!t) return '';
  t=esc(t).replace(/\(([^)]+)\)\s*$/,'<span class="b-src">($1)</span>');
  return '<div class="b-line"><div class="b-dot"></div><div class="b-txt">'+t+'</div></div>';
}
async function loadBriefing(today){
  const body=document.getElementById('briefBody');
  try{
    const rows=await sb('briefings?date_key=eq.'+today+'&select=briefing');
    if(!rows.length){
      body.innerHTML='<div class="b-quiet">No briefing yet today — it lands at 6am.</div>';
      return;
    }
    const lines=rows[0].briefing.split('\n').map(l=>l.trim())
      .filter(l=>l && !l.startsWith('#') && !/^\*\*/.test(l));
    body.innerHTML = lines.length ? lines.map(briefLine).join('')
      : '<div class="b-quiet">Nothing to report.</div>';
  }catch(e){
    body.innerHTML='<div class="b-quiet">Couldn\'t reach the briefing.</div>';
  }
}
async function loadStats(today){
  try{
    const [ev,td]=await Promise.all([
      sb('planner_events?date_key=eq.'+today+'&select=done'),
      sb('planner_todos?date_key=eq.'+today+'&select=done')
    ]);
    document.getElementById('stEvents').textContent=ev.filter(e=>!e.done).length;
    document.getElementById('stTodos').textContent=td.filter(t=>!t.done).length;
  }catch(e){}
}
function loadCountdown(){
  const days=Math.ceil((new Date(MILESTONE.date+'T12:00:00')-new Date())/86400000);
  document.getElementById('stDays').textContent = days>0 ? days : '—';
  document.getElementById('stDaysLbl').textContent = days>0 ? MILESTONE.label : 'Passed';
}

/* ── BOOT ── */
(function(){
  const now=new Date();
  const h=now.getHours();
  let g;
  if(h<5)       g='Still up.';
  else if(h<12) g='Good morning.';
  else if(h<17) g='Good afternoon.';
  else if(h<21) g='Good evening.';
  else          g='Long day. Almost done.';
  document.getElementById('greeting').textContent=g;
  document.getElementById('quote').textContent=QUOTES[now.getDay()];
  document.getElementById('briefDate').textContent=DAYS_S[now.getDay()]+' · '+MONTHS_S[now.getMonth()]+' '+now.getDate();
  loadCountdown();

  let s=null;
  try{s=JSON.parse(localStorage.getItem('je_session')||'null');}catch(e){}
  const t=Math.floor(Date.now()/1000);
  if(s && s.expires_at > t+60){
    window.JE_TOKEN=s.access_token;
    const today=ymd(now);
    loadBriefing(today);
    loadStats(today);
  } else if(s && s.refresh_token){
    jeRefresh(s.refresh_token);
  } else {
    jeShowLogin();
  }
})();
</script>


<script>
/* rotate the daily quote gently */
(function rotq(){
  var el=document.getElementById('quote'); if(!el||typeof QUOTES==='undefined')return;
  var i=(new Date()).getDay();
  setInterval(function(){el.style.opacity='0';setTimeout(function(){i=(i+1)%QUOTES.length;el.textContent=QUOTES[i];el.style.opacity='1';},900);},5000);
})();
/* next-event pulse */
(function pulse(){
  function fmtH(h){var ap=h>=12?'PM':'AM';var h12=((h+11)%12)+1;return h12+':00 '+ap;}
  function run(){
    var now=new Date();
    var today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    fetch(JE_URL+'/rest/v1/planner_events?date_key=eq.'+today+'&select=title,hour,done',{headers:{apikey:JE_KEY,Authorization:'Bearer '+(window.JE_TOKEN||JE_KEY)}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(rows){
      var open=(rows||[]).filter(function(e){return !e.done;});
      open.sort(function(a,b){return (a.hour==null?99:a.hour)-(b.hour==null?99:b.hour);});
      var nowH=now.getHours();
      var next=open.filter(function(e){return e.hour!=null&&e.hour>=nowH;})[0]||open[0];
      var nx=document.getElementById('pulseNext'),tm=document.getElementById('pulseTime');
      if(!nx)return;
      if(next){nx.textContent=next.title||'Event';tm.textContent=(next.hour!=null)?fmtH(next.hour):'All day';}
      else{nx.textContent='Nothing left today ✦';tm.textContent='';}
    }).catch(function(){});
  }
  if(window.JE_TOKEN){run();}
  else{var t=0,iv=setInterval(function(){t++;if(window.JE_TOKEN){clearInterval(iv);run();}else if(t>20){clearInterval(iv);}},300);}
})();
</script>

<script>
(async function followBadge(){
  // Wait until the sign-in has produced a token
  if(!window.JE_TOKEN){
    // try again shortly in case auth is still resolving
    let tries = 0;
    const iv = setInterval(()=>{
      tries++;
      if(window.JE_TOKEN){ clearInterval(iv); run(); }
      else if(tries > 20){ clearInterval(iv); }
    }, 300);
    return;
  }
  run();

  async function run(){
    try{
      const today = new Date();
      const todayStr = today.getFullYear()+'-'
        +String(today.getMonth()+1).padStart(2,'0')+'-'
        +String(today.getDate()).padStart(2,'0');

      const r = await fetch(
        JE_URL + '/rest/v1/follow_ups?answered=eq.false&select=logged_on,chase_days',
        { headers:{ apikey: JE_KEY, Authorization:'Bearer '+(window.JE_TOKEN||JE_KEY) } }
      );
      if(!r.ok) return;
      const rows = await r.json();

      const overdue = rows.filter(f=>{
        const logged = new Date(f.logged_on+'T12:00:00');
        const now = new Date(todayStr+'T12:00:00');
        const days = Math.floor((now - logged)/86400000);
        return days >= f.chase_days;
      }).length;

      if(overdue > 0){
        const tile = document.querySelector('.t-follow');
        if(tile){
          const b = document.createElement('span');
          b.id = 'followBadge';
          b.className = 'show';
          b.textContent = overdue;
          tile.appendChild(b);
        }
      }
    }catch(e){ /* silent — the tile still works */ }
  }
})();
</script>

</body>
</html>
