<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#F4EFE8;--cream2:#EDE6DC;--cream3:#E5DDD2;--white:#FDFAF6;
  --terra:#C4714F;--terra-l:#D4876E;--terra-d:#A85A38;
  --rose:#B8896E;--brown:#2C1A0E;--brown-mid:#6B4232;--brown-soft:#9A7060;
  --green:#3A7D4F;--green-bg:#EBF5EE;--green-border:#B8DFC4;
  --border:#DDD4C8;--shadow:rgba(44,26,14,0.08);
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh;padding-bottom:80px;}

/* HEADER */
.hdr{background:var(--brown);padding:32px 18px 20px;position:relative;overflow:hidden;text-align:center;}
.hdr::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(196,113,79,0.15),transparent 70%);}
.hdr-eye{font-size:9px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--rose);margin-bottom:6px;position:relative;z-index:1;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;color:var(--cream);line-height:1;position:relative;z-index:1;}
.hdr-title span{color:var(--terra-l);}
.hdr-sub{font-size:11px;color:rgba(244,239,232,0.6);margin-top:5px;font-style:italic;font-family:'Cormorant Garamond',serif;position:relative;z-index:1;}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:12px 18px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--brown-soft);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;}
.tab.active{color:var(--terra);border-bottom-color:var(--terra);}

/* WEEK NAV */
.wnav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--white);border-bottom:1px solid var(--border);}
.wnav-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--cream);color:var(--terra);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;}
.wnav-lbl{text-align:center;}
.wnav-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--brown);}
.wnav-sub{font-size:10px;font-weight:600;color:var(--brown-soft);margin-top:1px;}

/* WEEK VIEW */
.week{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.day-card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px var(--shadow);}
.day-card.today{border-color:var(--terra);border-width:1.5px;}
.day-card.weekend{background:var(--cream2);}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;}
.day-name{font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--brown-mid);}
.day-date{font-size:11px;font-weight:600;color:var(--brown-soft);}
.today-badge{background:var(--terra);color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:0.05em;text-transform:uppercase;}
.football-badge{background:#FDF0EB;color:var(--terra);font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;}
.meal-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 10px 12px;}
.meal-slot{background:var(--cream);border-radius:10px;padding:8px 6px;min-height:58px;cursor:pointer;border:1.5px dashed var(--border);transition:all 0.15s;position:relative;}
.meal-slot:active{background:var(--cream2);}
.meal-slot.filled{background:var(--white);border-style:solid;border-color:var(--border);}
.slot-type{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--brown-soft);margin-bottom:4px;}
.slot-meal{font-size:11px;font-weight:600;color:var(--brown);line-height:1.3;}
.slot-empty{font-size:18px;color:var(--cream3);line-height:1;}
.slot-del{position:absolute;top:3px;right:3px;background:none;border:none;font-size:10px;color:var(--brown-soft);cursor:pointer;opacity:0;transition:opacity 0.15s;}
.meal-slot:hover .slot-del{opacity:1;}
.meal-slot.filled .slot-del{opacity:0.5;}

/* WEEKEND */
.weekend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px 12px;}
.weekend-col-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--brown-soft);padding:4px 0 6px;}
.weekend-meals{display:flex;flex-direction:column;gap:5px;}

/* ADD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(44,26,14,0.55);z-index:100;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--white);border-radius:22px 22px 0 0;padding:20px 18px 44px;width:100%;border-top:2px solid var(--border);}
.modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--brown);margin-bottom:14px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;background:var(--cream);color:var(--brown);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;outline:none;}
.search-input:focus{border-color:var(--terra);}
.search-input::placeholder{color:var(--brown-soft);}

/* SUGGESTIONS LIST - inline below input */
.suggestions{background:var(--white);border:1.5px solid rgba(196,113,79,0.3);border-radius:11px;margin-bottom:10px;max-height:200px;overflow-y:auto;display:none;}
.suggestions.open{display:block;}
.sug-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.12s;}
.sug-item:last-child{border-bottom:none;}
.sug-item:active{background:var(--cream);}
.sug-emoji{font-size:18px;flex-shrink:0;}
.sug-name{font-size:13px;font-weight:700;color:var(--brown);flex:1;}
.sug-meta{font-size:10px;font-weight:600;color:var(--brown-soft);}

/* CATEGORY FILTER */
.cat-filter{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px;}
.cat-filter::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:6px 13px;border-radius:18px;border:1.5px solid var(--border);background:transparent;color:var(--brown-mid);font-family:'Inter',sans-serif;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.cat-btn.active{background:var(--terra);border-color:var(--terra);color:#fff;}

/* CUSTOM MEAL */
.custom-wrap{background:var(--cream);border-radius:11px;padding:12px 14px;border:1px solid var(--border);}
.custom-lbl{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--brown-soft);margin-bottom:8px;}

/* FORM ELEMENTS */
.form-row{display:flex;gap:8px;margin-bottom:10px;}
.form-row>div{flex:1;}
.form-lbl{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--brown-soft);margin-bottom:4px;}
.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--cream);color:var(--brown);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;outline:none;-webkit-appearance:none;}
.form-select:focus{border-color:var(--terra);}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--cream);color:var(--brown);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;outline:none;}
.form-input:focus{border-color:var(--terra);}
.form-input::placeholder{color:var(--brown-soft);}

/* BUTTONS */
.btn-add{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--terra-d),var(--terra));color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;}
.btn-cancel{width:100%;padding:11px;border-radius:11px;border:none;background:var(--cream2);color:var(--brown-soft);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;}

/* RECIPES TAB */
.recipes-grid{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.recipe-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px;box-shadow:0 1px 4px var(--shadow);cursor:pointer;}
.recipe-card:active{background:var(--cream);}
.rc-emoji{font-size:22px;margin-bottom:6px;}
.rc-name{font-size:12px;font-weight:700;color:var(--brown);line-height:1.3;margin-bottom:4px;}
.rc-meta{display:flex;gap:5px;flex-wrap:wrap;}
.rc-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;background:var(--cream2);color:var(--brown-soft);}
.rc-time{font-size:9px;font-weight:600;color:var(--terra);}

/* LOG TAB */
.log-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.log-item{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.log-emoji{font-size:20px;flex-shrink:0;}
.log-name{font-size:13px;font-weight:700;color:var(--brown);}
.log-meta{font-size:10px;font-weight:600;color:var(--brown-soft);margin-top:2px;}
.log-del{background:none;border:none;font-size:14px;cursor:pointer;color:var(--brown-soft);margin-left:auto;}

/* EMPTY */
.empty{text-align:center;padding:30px 20px;}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-text{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--brown-soft);}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--terra);color:#fff;padding:9px 20px;border-radius:20px;font-size:11px;font-weight:700;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--brown);border-top:2px solid rgba(196,113,79,0.3);padding:9px 20px 16px;display:flex;justify-content:space-around;z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(244,239,232,0.4);}
.nav-item.active{color:var(--terra-l);}
.nav-icon{font-size:18px;}
</style>

<div class="hdr">
  <div class="hdr-eye">Life · J Empire</div>
  <div class="hdr-title">🫙 <span>Meal Planner</span></div>
  <div class="hdr-sub">"Feed your family well. Plan once, eat all week." ✦</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('week',this)">📅 Week</div>
  <div class="tab" onclick="switchTab('recipes',this)">🍽️ Recipes</div>
  <div class="tab" onclick="switchTab('log',this)">📋 Log</div>
  <div class="tab" onclick="openAddModal(-1,'Dinner')">+ Add</div>
</div>

<!-- WEEK TAB -->
<div id="tab-week">
  <div class="wnav">
    <button class="wnav-btn" onclick="changeWeek(-1)">‹</button>
    <div class="wnav-lbl">
      <div class="wnav-title" id="weekTitle"></div>
      <div class="wnav-sub" id="weekSub"></div>
    </div>
    <button class="wnav-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div class="week" id="weekView"></div>
</div>

<!-- RECIPES TAB -->
<div id="tab-recipes" style="display:none;">
  <div style="padding:12px 14px 6px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;">
    <button class="cat-btn active" onclick="filterRecipes('All',this)">✦ All</button>
    <button class="cat-btn" onclick="filterRecipes('Breakfast',this)">🍳 Breakfast</button>
    <button class="cat-btn" onclick="filterRecipes('Lunch',this)">🥪 Lunch</button>
    <button class="cat-btn" onclick="filterRecipes('Snack',this)">🍎 Snack</button>
    <button class="cat-btn" onclick="filterRecipes('Latin',this)">🌶️ Latin</button>
    <button class="cat-btn" onclick="filterRecipes('American',this)">🍔 American</button>
    <button class="cat-btn" onclick="filterRecipes('Quick',this)">⚡ Quick</button>
    <button class="cat-btn" onclick="filterRecipes('Kids Fave',this)">🏡 Kids</button>
    <button class="cat-btn" onclick="filterRecipes('Healthy',this)">🌿 Healthy</button>
    <button class="cat-btn" onclick="filterRecipes('Seafood',this)">🐟 Seafood</button>
    <button class="cat-btn" onclick="filterRecipes('Batch Cook',this)">🫙 Batch</button>
  </div>
  <div class="recipes-grid" id="recipesGrid"></div>
</div>

<!-- LOG TAB -->
<div id="tab-log" style="display:none;">
  <div style="padding:12px 14px 6px;display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--brown-soft);">Recent Meals</div>
    <button onclick="clearLog()" style="background:none;border:none;font-size:10px;font-weight:600;color:var(--terra);cursor:pointer;font-family:'Inter',sans-serif;">Clear All</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Meal</div>

    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Type to search meals..." autocomplete="off" oninput="handleSearch(this.value)"/>
    </div>
    <div class="suggestions" id="suggestionsList"></div>

    <div class="cat-filter" id="modalCatFilter"></div>

    <div class="custom-wrap">
      <div class="custom-lbl">Or add a custom meal</div>
      <input class="form-input" id="customMeal" placeholder="Type any meal name..." style="margin-bottom:8px;"/>
      <div class="form-row">
        <div>
          <div class="form-lbl">Meal Type</div>
          <select class="form-select" id="mealType">
            <option>Breakfast</option>
            <option>Lunch</option>
            <option selected>Dinner</option>
            <option>Snack</option>
          </select>
        </div>
        <div>
          <div class="form-lbl">Day</div>
          <select class="form-select" id="mealDay">
            <option value="0">Sunday</option>
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6">Saturday</option>
          </select>
        </div>
      </div>
      <button class="btn-add" onclick="addCustomMeal()">Add Meal ✦</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let meals=[], weekOffset=0, modalDay=-1, modalType='Dinner', activeCat='All';

function getWeekStart(offset){
  const d=new Date(); d.setHours(0,0,0,0);
  const day=d.getDay();
  d.setDate(d.getDate()-day+(offset*7));
  return d;
}

function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function changeWeek(d){weekOffset+=d;renderWeek();}

function switchTab(t,el){
  ['week','recipes','log'].forEach(x=>document.getElementById('tab-'+x).style.display='none');
  document.getElementById('tab-'+t).style.display='block';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  if(t==='recipes') renderRecipes();
  if(t==='log') renderLog();
}

function renderWeek(){
  const start=getWeekStart(weekOffset);
  const today=new Date(); today.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(end.getDate()+6);
  document.getElementById('weekTitle').textContent=weekOffset===0?'This Week':weekOffset===1?'Next Week':weekOffset===-1?'Last Week':MO[start.getMonth()]+' '+start.getDate();
  document.getElementById('weekSub').textContent=MO[start.getMonth()]+' '+start.getDate()+' – '+MO[end.getMonth()]+' '+end.getDate();

  let html='';
  // Mon-Fri
  for(let i=1;i<=5;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const dk=dateKey(d);
    const isToday=d.getTime()===today.getTime();
    const isFB=i===2||i===4;
    html+=`<div class="day-card${isToday?' today':''}">
      <div class="day-hdr">
        <div class="day-name">${SH[d.getDay()]} ${d.getDate()}</div>
        <div style="display:flex;gap:5px;">
          ${isToday?'<div class="today-badge">Today</div>':''}
          ${isFB?'<div class="football-badge">🏈 Football</div>':''}
        </div>
      </div>
      <div class="meal-slots">
        ${TYPES.map(t=>{
          const meal=meals.find(m=>m.date===dk&&m.type===t);
          const meta=meal?MEALS[meal.name]:null;
          return `<div class="meal-slot${meal?' filled':''}" data-dow="${d.getDay()}" data-mtype="${t}" data-date="${dk}" onclick="slotClick(this)">
            <div class="slot-type">${TYPE_SHORT[t]}</div>
            ${meal?`<div class="slot-meal">${meta?meta.emoji+' ':''} ${meal.name}</div><button class="slot-del" data-meal-id="${meal.id}" onclick="event.stopPropagation();deleteMealById(this)">✕</button>`:`<div class="slot-empty">+</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  // Weekend
  const sat=new Date(start); sat.setDate(sat.getDate()+6);
  const sun=new Date(start);
  const satKey=dateKey(sat), sunKey=dateKey(sun);
  html+=`<div class="day-card weekend">
    <div class="day-hdr"><div class="day-name">Weekend</div></div>
    <div class="weekend-grid">
      <div>
        <div class="weekend-col-label">Saturday ${sat.getDate()}</div>
        <div class="weekend-meals">
          ${TYPES.map(t=>{const meal=meals.find(m=>m.date===satKey&&m.type===t);const meta=meal?MEALS[meal.name]:null;return `<div class="meal-slot${meal?' filled':''}" style="min-height:44px;" data-dow="6" data-mtype="${t}" data-date="${satKey}" onclick="slotClick(this)"><div class="slot-type">${TYPE_SHORT[t]}</div>${meal?`<div class="slot-meal">${meta?meta.emoji+' ':''} ${meal.name}</div><button class="slot-del" data-meal-id="${meal.id}" onclick="event.stopPropagation();deleteMealById(this)">✕</button>`:'<div class="slot-empty">+</div>'}</div>`;}).join('')}
        </div>
      </div>
      <div>
        <div class="weekend-col-label">Sunday ${sun.getDate()}</div>
        <div class="weekend-meals">
          ${TYPES.map(t=>{const meal=meals.find(m=>m.date===sunKey&&m.type===t);const meta=meal?MEALS[meal.name]:null;return `<div class="meal-slot${meal?' filled':''}" style="min-height:44px;" data-dow="0" data-mtype="${t}" data-date="${sunKey}" onclick="slotClick(this)"><div class="slot-type">${TYPE_SHORT[t]}</div>${meal?`<div class="slot-meal">${meta?meta.emoji+' ':''} ${meal.name}</div><button class="slot-del" data-meal-id="${meal.id}" onclick="event.stopPropagation();deleteMealById(this)">✕</button>`:'<div class="slot-empty">+</div>'}</div>`;}).join('')}
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('weekView').innerHTML=html;
}

function openAddModal(dow, type){
  modalDay=dow; modalType=type;
  document.getElementById('modalTitle').textContent='Add '+type;
  // Set day selector
  const dayEl=document.getElementById('mealDay');
  if(dow>=0) dayEl.value=dow;
  else{const today=new Date();dayEl.value=today.getDay();}
  // Set meal type
  const typeEl=document.getElementById('mealType');
  for(let i=0;i<typeEl.options.length;i++){if(typeEl.options[i].value===type){typeEl.selectedIndex=i;break;}}
  // Build category filter
  const cats=['All','Breakfast','Lunch','Snack','Latin','American','Quick','Kids Fave','Healthy','Seafood','Batch Cook'];
  document.getElementById('modalCatFilter').innerHTML=cats.map(c=>`<button class="cat-btn${activeCat===c?' active':''}" onclick="setModalCat('\''${c}'\'')">${c}</button>`).join('');
  // Clear search
  document.getElementById('searchInput').value='';
  document.getElementById('suggestionsList').classList.remove('open');
  document.getElementById('customMeal').value='';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),300);
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('suggestionsList').classList.remove('open');
}

function setModalCat(cat){
  activeCat=cat;
  document.querySelectorAll('#modalCatFilter .cat-btn').forEach(b=>{b.classList.toggle('active',b.textContent.includes(cat)||( cat==='All'&&b.textContent==='All'));});
  handleSearch(document.getElementById('searchInput').value);
}

function handleSearch(val){
  const list=document.getElementById('suggestionsList');
  let matches=Object.keys(MEALS);
  if(activeCat!=='All') matches=matches.filter(n=>MEALS[n].cat===activeCat);
  if(val.trim()) matches=matches.filter(n=>n.toLowerCase().includes(val.toLowerCase()));
  else if(activeCat==='All'){list.classList.remove('open');return;}
  matches=matches.slice(0,12);
  if(!matches.length){list.classList.remove('open');return;}
  list.innerHTML=matches.map(name=>{
    const m=MEALS[name];
    return `<div class="sug-item" onclick="selectMeal('${name.replace(/'/g,"\\'")}')">
      <div class="sug-emoji">${m.emoji}</div>
      <div class="sug-name">${name}</div>
      <div class="sug-meta">${m.cat} · ${m.time}</div>
    </div>`;
  }).join('');
  list.classList.add('open');
}

function selectMeal(name){
  const dow=parseInt(document.getElementById('mealDay').value);
  const type=document.getElementById('mealType').value;
  saveMeal(name,dow,type);
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('suggestionsList').classList.remove('open');
}

function addCustomMeal(){
  const name=document.getElementById('customMeal').value.trim();
  if(!name){showToast('Enter a meal name');return;}
  const dow=parseInt(document.getElementById('mealDay').value);
  const type=document.getElementById('mealType').value;
  saveMeal(name,dow,type);
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveMeal(name,dow,type){
  const start=getWeekStart(weekOffset);
  const d=new Date(start); d.setDate(d.getDate()+dow);
  // If Sun offset is 0 already
  const dk=dateKey(d);
  const meal={id:'meal_'+Date.now(),name,date:dk,type,dow};
  meals.push(meal);
  ls('je_meals_v2',meals);
  // Also save to Supabase async
  sbf('meal_plans','POST',{name,date:dk,type,week_offset:weekOffset});
  renderWeek();
  showToast((MEALS[name]?MEALS[name].emoji+' ':'')+name+' added ✦');
}

function deleteMeal(id){
  meals=meals.filter(m=>m.id!==id);
  ls('je_meals_v2',meals);
  renderWeek();
  showToast('Removed');
}

function filterRecipes(cat,btn){
  document.querySelectorAll('#tab-recipes .cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRecipes(cat);
}

function renderRecipes(cat='All'){
  const names=Object.keys(MEALS).filter(n=>cat==='All'||MEALS[n].cat===cat);
  document.getElementById('recipesGrid').innerHTML=names.map(name=>{
    const m=MEALS[name];
    return `<div class="recipe-card" onclick="openAddModal(-1,'${document.getElementById('mealType')?document.getElementById('mealType').value:'Dinner'}')">
      <div class="rc-emoji">${m.emoji}</div>
      <div class="rc-name">${name}</div>
      <div class="rc-meta"><span class="rc-tag">${m.cat}</span><span class="rc-time">⏱ ${m.time}</span>${m.kids?'<span class="rc-tag">👶 Kids</span>':''}</div>
    </div>`;
  }).join('');
}

function renderLog(){
  const recent=[...meals].reverse().slice(0,30);
  const el=document.getElementById('logList');
  if(!recent.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No meals logged yet ✦</div></div>';return;}
  el.innerHTML=recent.map(m=>{
    const meta=MEALS[m.name];
    return `<div class="log-item">
      <div class="log-emoji">${meta?meta.emoji:'🍽️'}</div>
      <div><div class="log-name">${m.name}</div><div class="log-meta">${m.type} · ${m.date}</div></div>
      <button class="log-del" onclick="deleteMeal('${m.id}')">✕</button>
    </div>`;
  }).join('');
}

function clearLog(){if(!confirm('Clear all meals?'))return;meals=[];ls('je_meals_v2',meals);renderLog();renderWeek();}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}


function slotClick(el){
  const dow=parseInt(el.dataset.dow);
  const type=el.dataset.mtype||'Dinner';
  openAddModal(dow,type);
}
function deleteMealById(el){
  deleteMeal(el.dataset.mealId);
}

// INIT
async function init(){
  try{
    const data=await sbf('meal_plans','GET',null,'?order=created_at.desc&limit=200');
    if(data&&data.length) meals=data.map(m=>({id:m.id||'m_'+Date.now(),name:m.name,date:m.date,type:m.type,dow:new Date(m.date).getDay()}));
    else meals=lg('je_meals_v2')||[];
  }catch(e){
    meals=lg('je_meals_v2')||[];
  }
  renderWeek();
}
init();
</script>
