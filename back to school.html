<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  --brown-muted:#9A6E58; --brown-soft:#C4A090;
  --white-warm:rgba(255,252,248,0.95);
  --green:#5A8A5E;
}
body { min-height:100vh; font-family:'Inter',sans-serif; background:var(--cream-deep); color:var(--brown-dark); }

.header { position:relative; overflow:hidden; padding:48px 24px 28px; text-align:center; background:var(--cream); background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(180,140,105,0.07) 3px,rgba(180,140,105,0.07) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(180,140,105,0.05) 3px,rgba(180,140,105,0.05) 4px); }
.header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,transparent,var(--terra) 20%,var(--rose-light) 50%,var(--rose-gold) 80%,transparent); }
.header-marble { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.header-glow { position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 85% 10%,rgba(196,113,79,0.15) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 10% 85%,rgba(184,137,110,0.11) 0%,transparent 50%); }
.bracket { position:absolute; width:24px; height:24px; opacity:0.3; }
.btl { top:14px; left:16px; border-top:1.5px solid var(--terra); border-left:1.5px solid var(--terra); }
.btr { top:14px; right:16px; border-top:1.5px solid var(--terra); border-right:1.5px solid var(--terra); }
.header-content { position:relative; z-index:2; }
.header-eyebrow { font-size:9px; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:var(--rose-gold); margin-bottom:6px; }
.header-title { font-family:'Cormorant Garamond',serif; font-size:44px; font-weight:300; color:var(--brown-dark); line-height:0.95; letter-spacing:0.06em; margin-bottom:10px; }
.header-title em { font-style:italic; color:var(--terra); }
.header-divider { display:flex; align-items:center; gap:8px; width:160px; margin:0 auto 10px; }

.hdg { width:4px; height:4px; background:var(--terra); transform:rotate(45deg); opacity:0.7; }
.header-quote { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--brown-muted); }

/* TAX FREE BANNER */

.tax-banner-text { font-size:11px; font-weight:700; color:#FFF8F0; letter-spacing:0.08em; }
.tax-banner-sub { font-size:9.5px; color:rgba(255,252,248,0.8); }

/* STATS PILLS */
.stats-row { display:flex; gap:8px; padding:14px 16px; overflow-x:auto; scrollbar-width:none; }
.stats-row::-webkit-scrollbar { display:none; }
.stat-pill { flex-shrink:0; background:var(--white-warm); border:1px solid rgba(196,113,79,0.18); border-radius:14px; padding:10px 14px; text-align:center; min-width:80px; box-shadow:0 2px 8px rgba(196,113,79,0.07); }
.stat-pill-label { font-size:8.5px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--brown-muted); }
.stat-pill-value { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra); margin-top:2px; font-weight:400; }

/* VIEW TABS */
.view-tabs { display:flex; gap:8px; padding:0 16px 12px; }
.view-tab { flex:1; padding:9px; border-radius:14px; border:1.5px solid rgba(196,113,79,0.22); background:transparent; color:var(--brown-muted); font-size:11px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.18s; font-family:'Inter',sans-serif; }
.view-tab.active { background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border-color:transparent; box-shadow:0 3px 10px rgba(196,113,79,0.28); }

/* KID TABS */
.kid-tabs { display:flex; gap:8px; padding:0 16px 14px; overflow-x:auto; scrollbar-width:none; }

.kid-tab { flex-shrink:0; padding:10px 14px; border-radius:18px; border:2px solid transparent; cursor:pointer; text-align:center; transition:all 0.2s; background:var(--white-warm); box-shadow:0 2px 8px rgba(196,113,79,0.07); min-width:72px; }
.kid-heart { font-size:20px; display:block; margin-bottom:3px; }
.kid-name-lbl { font-size:12px; font-weight:700; color:var(--brown-dark); }
.kid-grade-lbl { font-size:9px; color:var(--brown-muted); margin-top:2px; }
.kid-progress-lbl { font-size:10px; font-weight:600; margin-top:3px; }

/* MAIN */
.main { padding:0 16px 100px; max-width:500px; margin:0 auto; }

/* KID HEADER */
.kid-list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }

.prog-label { display:flex; justify-content:space-between; font-size:10px; color:var(--brown-muted); font-weight:600; margin-bottom:5px; }

.prog-fill { height:100%; border-radius:20px; transition:width 0.4s; }

/* NOTES CARD */
.notes-card { position:relative; overflow:hidden; background:var(--white-warm); border:1px solid rgba(196,113,79,0.15); border-left:4px solid var(--rose-light); border-radius:16px; padding:14px 16px; margin-bottom:10px; box-shadow:0 2px 8px rgba(196,113,79,0.06); }
.notes-head { display:flex; align-items:center; gap:7px; margin-bottom:9px; }
.notes-title { font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--brown-dark); }
.notes-rule { flex:1; height:1px; background:linear-gradient(90deg,rgba(196,113,79,0.28),transparent); }
.notes-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
.notes-list li { position:relative; padding-left:16px; font-size:12.5px; line-height:1.45; color:var(--brown-mid); }
.notes-list li::before { content:'✦'; position:absolute; left:0; top:0; font-size:9px; color:var(--rose-light); }

/* SECTION CARD */
.section-card { background:var(--white-warm); border:1px solid rgba(196,113,79,0.15); border-radius:16px; padding:14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(196,113,79,0.06); }
.section-title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.section-title-text { font-size:12px; font-weight:700; color:var(--brown-dark); }
.section-count-badge { font-size:10px; color:var(--brown-soft); font-weight:600; }

/* ITEM ROW */
.item-row { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid rgba(196,113,79,0.08); }
.item-row:last-child { border-bottom:none; }
.item-check-box { width:20px; height:20px; cursor:pointer; flex-shrink:0; margin-top:1px; accent-color:var(--terra); }
.item-info { flex:1; }
.item-name-text { font-size:13px; color:var(--brown-dark); font-weight:500; line-height:1.4; }
.item-name-text.checked { text-decoration:line-through; color:var(--brown-soft); }
.item-meta-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; align-items:center; }
.store-badge { font-size:9px; padding:2px 7px; border-radius:6px; font-weight:700; color:white; letter-spacing:0.04em; }
.store-walmart { background:#0ea5e9; }
.store-target { background:#ef4444; }
.store-dollartree { background:var(--green); }
.store-school { background:#8B5CF6; }
.item-price-text { font-size:10px; color:var(--brown-muted); font-weight:600; }

/* SECTION TOTAL */
.section-total-row { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:rgba(196,113,79,0.06); border-radius:10px; margin-top:8px; }
.section-total-lbl { font-size:11px; font-weight:600; color:var(--brown-muted); }
.section-total-amt { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--terra); }

/* KID TOTAL */
.kid-total-card { background:linear-gradient(135deg,rgba(196,113,79,0.08),rgba(184,137,110,0.06)); border:1px solid rgba(196,113,79,0.2); border-radius:16px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.kid-total-lbl { font-size:13px; font-weight:700; color:var(--brown-dark); }
.kid-total-amt { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--terra); }

/* EDIT MODE */
.edit-row { display:flex; align-items:center; gap:6px; padding:8px 0; border-bottom:1px solid rgba(196,113,79,0.08); flex-wrap:wrap; }
.edit-name-inp { flex:1; min-width:100px; padding:6px 8px; border-radius:8px; border:1.5px solid rgba(196,113,79,0.25); background:var(--cream); color:var(--brown-dark); font-size:12px; outline:none; font-family:'Inter',sans-serif; }
.edit-price-inp { width:65px; padding:6px 8px; border-radius:8px; border:1.5px solid rgba(196,113,79,0.25); background:var(--cream); color:var(--brown-dark); font-size:12px; outline:none; text-align:center; }

.del-item-btn { background:rgba(196,113,79,0.1); border:1px solid rgba(196,113,79,0.2); border-radius:8px; color:var(--terra); font-size:13px; cursor:pointer; padding:4px 8px; flex-shrink:0; }
.add-item-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.add-item-inp { flex:1; min-width:100px; padding:8px 10px; border-radius:10px; border:1.5px solid rgba(196,113,79,0.22); background:var(--cream); color:var(--brown-dark); font-size:13px; outline:none; font-family:'Inter',sans-serif; }
.add-item-btn { padding:8px 14px; border-radius:10px; background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); border:none; font-weight:700; cursor:pointer; font-size:13px; font-family:'Inter',sans-serif; }

.route-wrap { display:flex; flex-direction:column; gap:12px; }

.sparkle { position:fixed; pointer-events:none; z-index:9999; animation:sparkle-fly 1.2s ease-out forwards; }

.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:linear-gradient(135deg,var(--terra),var(--terra-light)); color:var(--cream); padding:10px 22px; border-radius:24px; font-size:12px; font-weight:600; letter-spacing:0.08em; box-shadow:0 6px 20px rgba(196,113,79,0.4); opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.nav-bar { position:fixed; bottom:0; left:0; right:0; background:var(--cream); border-top:1px solid rgba(196,113,79,0.15); padding:10px 20px 18px; display:flex; justify-content:space-around; align-items:center; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-soft); transition:color 0.18s; }

.nav-icon { font-size:20px; }
</style>

function fmt(n){ return "$"+parseFloat(n||0).toFixed(2); }
function itemKey(kidId,si,ii){ return kidId+"-"+si+"-"+ii; }

function totalItems(){ return KIDS.reduce(function(s,k){ return s+k.sections.reduce(function(s2,sec){return s2+sec.items.length;},0); },0); }

function totalCost(){ return KIDS.reduce(function(s,k){ return s+k.sections.reduce(function(s2,sec){ return s2+sec.items.reduce(function(s3,i){return s3+parseFloat(i.total||0);},0);},0);},0); }
function totalSpent(){
  var spent=0;
  KIDS.forEach(function(k){ k.sections.forEach(function(sec,si){ sec.items.forEach(function(item,ii){ if(checked[itemKey(k.id,si,ii)]) spent+=parseFloat(item.total||0); }); }); });
  return spent;
}
function kidTotal(kid){ return kid.sections.reduce(function(s,sec){return s+sec.items.reduce(function(s2,i){return s2+parseFloat(i.total||0);},0);},0); }
function kidChecked(kid){ var c=0; kid.sections.forEach(function(sec,si){sec.items.forEach(function(item,ii){if(checked[itemKey(kid.id,si,ii)])c++;});}); return c; }
function kidItems(kid){ return kid.sections.reduce(function(s,sec){return s+sec.items.length;},0); }

function setKid(id){ activeKid=id; render(); }
function toggleEditMode(){ editMode=!editMode; render(); }

function updateItem(kidId,si,ii,field,val){
  var kid=KIDS.find(function(k){return k.id===kidId;});
  var item=kid.sections[si].items[ii];
  item[field]=val;
  if(field==="price"||field==="qty") item.total=parseFloat(item.price||0)*parseFloat(item.qty||1);
  saveData(); render();
}

function deleteItem(kidId,si,ii){
  var kid=KIDS.find(function(k){return k.id===kidId;});
  kid.sections[si].items.splice(ii,1);
  saveData(); render();
}

function addItem(kidId,si){
  var nameEl=document.getElementById("new-name-"+kidId+"-"+si);
  var priceEl=document.getElementById("new-price-"+kidId+"-"+si);
  var storeEl=document.getElementById("new-store-"+kidId+"-"+si);
  var name=nameEl.value.trim(); if(!name) return;
  var price=parseFloat(priceEl.value)||0;
  var store=storeEl.value;
  var kid=KIDS.find(function(k){return k.id===kidId;});
  kid.sections[si].items.push({name:name,store:store,price:price,qty:1,total:price});
  nameEl.value=""; priceEl.value="";
  saveData(); render();
}

function spawnSparkles(){
  var s=['✦','✧','⋆','🎒','⭑'],c=['#C4714F','#D4A574','#B8896E'];
  for(var i=0;i<5;i++){
    var el=document.createElement('div'); el.className='sparkle';
    el.textContent=s[Math.floor(Math.random()*s.length)];
    el.style.cssText='left:'+(20+Math.random()*60)+'vw;top:'+(15+Math.random()*55)+'vh;color:'+c[Math.floor(Math.random()*c.length)]+';font-size:'+(12+Math.random()*14)+'px;animation-delay:'+(Math.random()*0.4)+'s;position:fixed;pointer-events:none;z-index:9999;font-family:sans-serif;';
    document.body.appendChild(el); setTimeout(function(){el.remove();},1600);
  }
}
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
